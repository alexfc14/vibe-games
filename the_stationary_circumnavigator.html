<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Stationary Circumnavigator - Shielded Edition</title>
    <style>
        body { margin: 0; padding: 10px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; }

        #canvas-container {
            width: 100%;
            max-width: 800px;
            height: 440px;
            background: linear-gradient(180deg, #050b14 0%, #0d1b2a 40%, #1b263b 85%, #415a77 100%);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Floating Screen-Space DOM Labels */
        .dom-label {
            position: absolute;
            z-index: 5;
            transform: translate(-50%, -100%);
            background: rgba(15, 20, 30, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 3px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            font-weight: bold;
            color: #ffffff;
            pointer-events: none;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: opacity 0.1s, box-shadow 0.2s;
            opacity: 0;
        }

        .controls {
            width: 100%;
            max-width: 800px;
            margin-top: 15px;
            background: #1e1e1e;
            padding: 15px 10px;
            border-radius: 8px;
            box-sizing: border-box;
            border: 1px solid #2d2d2d;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .knobs-container {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            gap: 15px;
        }

        .knob-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            border-radius: 8px;
            padding: 8px;
            transition: all 0.3s;
        }

        .knob-label {
            font-size: 12px;
            font-weight: bold;
            color: #bbb;
            margin-bottom: 8px;
            text-align: center;
            height: 20px;
            line-height: 1.3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .knob-dial {
            position: relative;
            width: 85px;
            height: 85px;
            background: radial-gradient(circle, #333 0%, #222 70%);
            border-radius: 50%;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            cursor: pointer;
            transition: outline 0.3s, box-shadow 0.3s;
        }

        .knob-indicator {
            position: absolute;
            width: 4px;
            height: 28px;
            background: #ef4444;
            top: 10px;
            border-radius: 2px;
            transform-origin: bottom center;
            transform: rotate(0deg);
            pointer-events: none;
        }

        .knob-cap {
            width: 20px;
            height: 20px;
            background: #1a1a1a;
            border-radius: 50%;
            pointer-events: none;
        }

        .knob-value {
            margin-top: 6px;
            font-size: 13px;
            font-variant-numeric: tabular-nums;
            font-weight: bold;
            color: #666;
        }

        .manual-input-box {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            border-radius: 4px;
            padding: 2px;
            transition: all 0.3s;
        }

        .manual-input-box input {
            width: 48px;
            background: #111;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 5px;
            font-weight: bold;
            text-align: center;
            font-size: 12px;
        }

        .manual-input-box button {
            border: none;
            color: white;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Color-specific overrides */
        .polar-theme-btn {
            background: #3b82f6 !important;
        }
        .polar-theme-btn:active {
            background: #2563eb !important;
        }
        .polar-theme-input {
            color: #3b82f6 !important;
        }
        
        .solar-theme-btn {
            background: #eab308 !important;
        }
        .solar-theme-btn:active {
            background: #ca8a04 !important;
        }
        .solar-theme-input {
            color: #eab308 !important;
        }

        .telemetry-panel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(15, 20, 30, 0.75);
            padding: 10px;
            border-radius: 6px;
            font-size: 11px;
            font-family: monospace;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 10;
            color: #4ade80;
            line-height: 1.4;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        /* Instruction HUD Overlay */
        .instructions-hud {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(15, 20, 30, 0.75);
            border: 1px solid rgba(59, 130, 246, 0.4);
            padding: 12px;
            border-radius: 8px;
            width: 258px;
            max-height: 340px;
            overflow-y: auto;
            font-size: 11.5px;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .hud-title {
            color: #3b82f6;
            font-weight: bold;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        /* Success & Level Explanation Modal Overlay */
        .completion-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 12, 18, 0.9);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }
        
        .completion-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        /* Capped spacious but vertically compact flex modal card design */
        .modal-card {
            background: #1e1e1e;
            border: 1px solid #4ade80;
            max-width: 650px; /* Kept spacious width to allow side-by-side elements */
            width: 95%;
            max-height: 94%;
            padding: 16px 24px; /* Reduced vertical padding from 32px to 16px to prevent scroll */
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        
        .completion-overlay.show .modal-card {
            transform: scale(1);
        }
        
        .modal-title {
            color: #4ade80;
            font-size: 20px; /* Reduced slightly from 24px to save vertical space */
            font-weight: bold;
            margin-bottom: 10px; /* Reduced from 16px */
            flex-shrink: 0;
        }
        
        /* Inner scrollable area for rich content and scoreboards */
        .modal-body {
            font-size: 13.5px; /* Optimally sized for compact presentation */
            line-height: 1.45; /* Compact line spacing */
            color: #ddd;
            margin-bottom: 12px; /* Reduced from 20px */
            text-align: left;
            overflow-y: auto;
            flex: 1;
            padding-right: 6px;
            box-sizing: border-box;
        }

        /* Dark themed scrollbar styles for inner modal */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }
        .modal-body::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-shrink: 0; /* Keep buttons from scaling down */
            margin-top: 8px; /* Compacted margin */
        }

        .modal-btn {
            background: #4ade80;
            border: none;
            color: #111;
            padding: 8px 24px;
            font-weight: bold;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .modal-btn:hover {
            background: #34d399;
        }
        .modal-btn:active {
            transform: scale(0.97);
        }
        
        .modal-btn-secondary {
            background: #4b5563;
            color: white;
        }
        .modal-btn-secondary:hover {
            background: #374151;
        }

        /* Odometer Action Buttons */
        #btn-undo {
            background: #4b5563;
            border: none;
            color: white;
            padding: 6px 18px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            max-width: 90px;
            text-align: center;
        }

        #btn-undo:hover:not(:disabled) {
            background: #374151;
        }

        #btn-undo:active:not(:disabled) {
            transform: scale(0.97);
        }

        #btn-undo:disabled {
            background: #1f2937;
            color: #4b5563;
            cursor: not-allowed;
            box-shadow: none;
        }

        #btn-reset {
            background: #dc2626;
            border: none;
            color: white;
            padding: 6px 18px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            max-width: 90px;
            text-align: center;
        }

        #btn-reset:hover {
            background: #b91c1c;
        }

        #btn-reset:active {
            transform: scale(0.97);
        }

        /* Level Navigation Buttons */
        .lvl-nav-btn {
            background: #374151;
            border: none;
            color: white;
            padding: 6px 10px;
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: background 0.2s, transform 0.1s;
            text-align: center;
        }

        .lvl-nav-btn:hover:not(:disabled) {
            background: #4b5563;
        }

        .lvl-nav-btn:active:not(:disabled) {
            transform: scale(0.97);
        }

        .lvl-nav-btn:disabled {
            background: #1f2937;
            color: #4b5563;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Celebratory Pulse Overlay Screen Message */
        #celebration-banner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(74, 222, 128, 0.95);
            border: 2px solid #ffffff;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 20px;
            color: #111;
            z-index: 15;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
            animation: pulse-zoom 0.5s infinite alternate ease-in-out;
            backdrop-filter: blur(4px);
        }

        @keyframes pulse-zoom {
            0% { transform: translate(-50%, -50%) scale(0.95); }
            100% { transform: translate(-50%, -50%) scale(1.05); }
        }

        /* Dynamic Onboarding Interactive Tutorial bubble positioned TOP-RIGHT */
        .tutorial-bubble {
            position: absolute;
            top: 10px; /* Placed exactly at the top, same as instructions-hud */
            right: 10px; /* Placed exactly at the right, same as instructions-hud */
            width: 258px; /* Matching exact footprint of instructions-hud */
            max-width: 92%;
            background: rgba(15, 20, 30, 0.85); /* Semi-transparent onboarding background */
            border: 1.5px solid rgba(59, 130, 246, 0.6);
            border-radius: 8px; /* Matching corner roundings */
            padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 30;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            box-sizing: border-box;
            transform: translateY(10px);
        }
        .tutorial-bubble.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .tutorial-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            padding-bottom: 6px;
        }
        .tutorial-title {
            font-size: 10.5px;
            font-weight: bold;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .tutorial-skip-btn {
            background: none;
            border: none;
            color: #8892b0;
            font-size: 10px;
            cursor: pointer;
            text-decoration: underline;
        }
        .tutorial-skip-btn:hover {
            color: #ef4444;
        }
        .tutorial-text {
            font-size: 12px; /* Adjusted slightly to look gorgeous in a narrower profile */
            line-height: 1.48;
            color: #e2e8f0;
            min-height: 110px; /* Set comfortable height so actions remain stable */
            box-sizing: border-box;
        }
        .tutorial-text ul {
            margin: 6px 0 0 0;
            padding-left: 18px;
        }
        .tutorial-text li {
            margin-bottom: 4px;
        }
        .tutorial-actions-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 4px;
        }
        .tutorial-step-dots {
            display: flex;
            gap: 5px;
        }
        .step-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transition: background 0.2s, box-shadow 0.2s;
        }
        .step-dot.active {
            background: #3b82f6;
            box-shadow: 0 0 6px #3b82f6;
        }
        .tutorial-next-btn {
            background: #3b82f6;
            border: none;
            color: #fff;
            padding: 5px 12px;
            font-weight: bold;
            font-size: 10.5px;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.4);
            transition: all 0.2s;
        }
        .tutorial-next-btn:hover {
            background: #2563eb;
            box-shadow: 0 2px 12px rgba(37, 99, 235, 0.6);
        }

        /* Dom-based interactive highlighted blinking animations (Slow and Smooth) */
        @keyframes control-pulse {
            0% { box-shadow: 0 0 0px transparent; border-color: rgba(255,255,255,0.25); background: rgba(30, 30, 30, 0); }
            50% { box-shadow: 0 0 15px #3b82f6; border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
            100% { box-shadow: 0 0 0px transparent; border-color: rgba(255,255,255,0.25); background: rgba(30, 30, 30, 0); }
        }
        .element-blink {
            animation: control-pulse 2.5s infinite ease-in-out !important; /* Slowed down for breathing effect */
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>
</head>
<body>

    <div id="canvas-container">
        <div id="labels-overlay" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 4;"></div>

        <!-- Celebratory Screen Message banner -->
        <div id="celebration-banner">⭐ ALIGNMENT MATCHED! ⭐</div>

        <!-- Dynamic Onboarding Interactive Tutorial Dialog Box (Now aligned TOP-RIGHT) -->
        <div class="tutorial-bubble" id="onboarding-tutorial">
            <div class="tutorial-header">
                <div class="tutorial-title" id="tutorial-step-header">SYSTEM ONBOARDING</div>
                <button class="tutorial-skip-btn" id="tutorial-skip-btn">Skip Tutorial</button>
            </div>
            <div class="tutorial-text" id="tutorial-text-content">Loading Gyronia telemetry...</div>
            <div class="tutorial-actions-row">
                <div class="tutorial-step-dots" id="tutorial-dots-container"></div>
                <button class="tutorial-next-btn" id="tutorial-next-btn">Next Step ➡️</button>
            </div>
        </div>

        <!-- Instructional Game HUD Overlay -->
        <div class="instructions-hud" id="instructions-hud">
            <div class="hud-title" id="hud-level-title">Level 1: Holonomy Intro</div>
            <div id="hud-level-desc" style="line-height: 1.4; color: #ddd; font-size: 11px;">Loading...</div>
        </div>

        <!-- Dynamic Success & Question Prompt Modal -->
        <div class="completion-overlay" id="completion-modal">
            <div class="modal-card">
                <div class="modal-title" id="modal-heading">Challenge Complete! 🎉</div>
                <div class="modal-body" id="modal-content">Explanation text goes here.</div>
                <div class="modal-actions">
                    <button class="modal-btn modal-btn-secondary" id="modal-retry-btn">Retry Challenge</button>
                    <button class="modal-btn" id="modal-next-btn">Next Challenge</button>
                </div>
            </div>
        </div>

        <div class="telemetry-panel">
            <strong>🚀 POSE</strong><br>
            Lat: <span id="telemetry-lat">0.0° N</span><br>
            Lon: <span id="telemetry-lon">0.0° E</span><br>
            Tilt: <span id="telemetry-hdg">0.0°</span>
        </div>
    </div>

    <div class="controls">
        <div class="knobs-container">
            <!-- Polar Rotation (Blue Theme - Cold) -->
            <div class="knob-panel" id="polar-knob-panel">
                <div class="knob-label" style="color: #3b82f6;">Polar Rotation</div>
                <div class="manual-input-box" id="polar-input-box">
                    <button id="btn1-left" class="polar-theme-btn">⬅️</button>
                    <input type="number" id="num1" class="polar-theme-input" value="15" step="5">
                    <button id="btn1-right" class="polar-theme-btn">➡️</button>
                </div>
                <div class="knob-dial" id="dial1" style="border: 3px solid #3b82f6;">
                    <div class="knob-indicator" id="ind1"></div>
                    <div class="knob-cap" style="border: 2px solid #3b82f6;"></div>
                </div>
                <div class="knob-value" id="val1">0°</div>
            </div>

            <!-- Central Control Divider (Odometer, Highscores, Undo and Clear) -->
            <div class="middle-panel" style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-width: 130px; border-left: 1px solid #333; border-right: 1px solid #333; padding: 0 15px; align-self: stretch;">
                <div style="font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 0.5px;">Odometer</div>
                <div id="odom-value" style="font-size: 20px; font-weight: bold; color: #4ade80; font-family: monospace; margin-bottom: 2px;">0.0°</div>
                <!-- Dynamic Highscore tracking label inside UI -->
                <div style="font-size: 9px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px;">
                    Best: <span id="highscore-value" style="color: #3b82f6; font-family: monospace;">-</span>
                </div>
                <button id="btn-undo" disabled>Undo ↩️</button>
                <button id="btn-reset">Clear</button>
                <!-- Level Navigation controls below Clear button -->
                <div style="display: flex; gap: 6px; width: 100%; justify-content: center; margin-top: 4px;">
                    <button id="btn-prev-lvl" class="lvl-nav-btn" title="Previous Level">◀ Lvl</button>
                    <button id="btn-next-lvl" class="lvl-nav-btn" title="Next Level" disabled>Lvl ▶</button>
                </div>
            </div>

            <!-- Solar Rotation (Yellow Theme - Hot) -->
            <div class="knob-panel" id="solar-knob-panel">
                <div class="knob-label" style="color: #eab308;">Solar Rotation</div>
                <div class="manual-input-box" id="solar-input-box">
                    <button id="btn2-left" class="solar-theme-btn">⬅️</button>
                    <input type="number" id="num2" class="solar-theme-input" value="15" step="5">
                    <button id="btn2-right" class="solar-theme-btn">➡️</button>
                </div>
                <div class="knob-dial" id="dial2" style="border: 3px solid #eab308;">
                    <div class="knob-indicator" id="ind2"></div>
                    <div class="knob-cap" style="border: 2px solid #eab308;"></div>
                </div>
                <div class="knob-value" id="val2">0°</div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const labelsOverlay = document.getElementById('labels-overlay');
        const scene = new THREE.Scene();

        const width = container.clientWidth || 800;
        const height = container.clientHeight || 440;

        const camera = new THREE.PerspectiveCamera(38, width / height, 0.1, 50);
        
        // Lock Z-axis vertically and apply panning offset to set the planet on the left side by default!
        camera.up.set(0, 0, 1); 
        camera.position.set(1.9 + 0.26, -2.8 + 0.18, 1.0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.TrackballControls(camera, renderer.domElement);
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.0;
        controls.panSpeed = 0.6;
        controls.staticMoving = false;
        controls.dynamicDampingFactor = 0.28;
        controls.target.set(0.26, 0.18, 0.0); // Shift standard lookAt target horizontally to push planet left!

        scene.add(new THREE.AmbientLight(0x777777));
        const solarStream = new THREE.DirectionalLight(0xffffff, 1.4);
        solarStream.position.set(8, 0, 0);
        scene.add(solarStream);

        // --- CORE GEOMETRIC CONSTANTS ---
        const SPHERE_RADIUS = 1.0;
        const LINE_RADIUS = SPHERE_RADIUS * 0.998;

        // --- Core Rotating Group ---
        const planetGroup = new THREE.Group();
        scene.add(planetGroup);
        
        // --- STATIONARY ANCHORED PLANET SPHERE MESH ---

                const m = new THREE.Matrix4();
                m.set(

                    0,      -sinLat,           cosLat,          0,
                    0,       0,                0,              1

                    const t = j / steps;
                    const angleRads = THREE.MathUtils.degToRad(hist.angleDegrees * t);
                    const stepRot = new THREE.Quaternion().setFromAxisAngle(axisVec, angleRads);
                    const interpQ = hist.startQuaternion.clone().premultiply(stepRot);
                    points.push(new THREE.Vector3(0, -SPHERE_RADIUS, 0).applyQuaternion(interpQ));

                // Put a marker sphere at the end of this finalized move
                addMarkerAt(points[points.length - 1]);

            isTypewriting = true;
            let currentString = "";
            let charIndex = 0;
            const textElement = document.getElementById('tutorial-text-content');

            typewriterInterval = setInterval(() => {
                if (charIndex < step.text.length) {
                    if (step.text.substring(charIndex, charIndex + 4) === "<br>") {
                        currentString += "<br>";
                        charIndex += 4;
                    } else if (step.text.substring(charIndex, charIndex + 4) === "<ul>") {
                        currentString += "<ul>";
                        charIndex += 4;
                    } else if (step.text.substring(charIndex, charIndex + 5) === "</ul>") {
                        currentString += "</ul>";
                        charIndex += 5;
                    } else if (step.text.substring(charIndex, charIndex + 4) === "<li>") {
                        currentString += "<li>";
                        charIndex += 4;
                    } else if (step.text.substring(charIndex, charIndex + 5) === "</li>") {
                        currentString += "</li>";
                        charIndex += 5;
                    } else if (step.text.substring(charIndex, charIndex + 8) === "<strong>") {
                        const endTag = step.text.indexOf("</strong>", charIndex);
                        if (endTag !== -1) {
                            currentString += step.text.substring(charIndex, endTag + 9);
                            charIndex = endTag + 9;
                        } else {
                            currentString += step.text[charIndex];
                            charIndex++;
                        }
                    } else {
                        currentString += step.text[charIndex];
                        charIndex++;
                    }
                    textElement.innerHTML = currentString;
                } else {
                    clearInterval(typewriterInterval);
                    isTypewriting = false;
                    document.getElementById('tutorial-next-btn').innerText = (stepIndex === tutorialSteps.length - 1) ? "Launch Rover 🚀" : "Next Step ➡️";
                }
            }, 25); // Relaxed typing speed from 12ms to 25ms

            // Trigger DOM blinks corresponding to selected tutorial targets
            clearAllDOMHighlights();
            if (step.targetBlink === "stepButtons") {
                document.getElementById('polar-input-box').classList.add('element-blink');
                document.getElementById('solar-input-box').classList.add('element-blink');
            } else if (step.targetBlink === "circularDials") {
                document.getElementById('dial1').classList.add('element-blink');
                document.getElementById('dial2').classList.add('element-blink');
            }
        }

        // Resets the car position, orientation, and odometer completely
        function resetCarAndOdometer() {

            arrivedAtTarget = false; // Reset the state machine lock
            
            planetGroup.quaternion.copy(getStartQuaternion(currentLevel));

        // Dynamically updates Odometer HUD labels with correct unit context
        function updateOdometerDisplay(val) {

        function configureLevel(lvlId) {
            isLevelCompleted = false;
            arrivedAtTarget = false;
            
            // Cleanly restore rotation and odometer state automatically on level loads
            resetCarAndOdometer();

            // Re-hide successful panel overlay using the CSS transition class
            document.getElementById('completion-modal').classList.remove('show');

            const lvl = levelDefinitions[lvlId];
            document.getElementById('hud-level-title').innerText = lvl.title;
            document.getElementById('hud-level-desc').innerHTML = lvl.shortDesc;

            // Update real-time highscore readout next to the odometer with correct unit
            const record = highscores[lvlId];
            const unit = lvl.isPhysicalDistance ? "m" : "°";
            document.getElementById('highscore-value').innerText = record !== null ? record.toFixed(1) + unit : '-';

            // Positioning Ghost Target (Pose B) on the world sphere
            ghostGroup.position.copy(lvl.targetPos);

            // Handle arrow mesh visibility
            if (lvl.hideArrows) {
                headingArrow.visible = false;
                ghostArrow.visible = false;
                
                // Safely safeguard legend-ghost-item which was removed from HTML
                const legendGhostItem = document.getElementById('legend-ghost-item');
                if (legendGhostItem) legendGhostItem.style.display = 'none';
            } else {
                headingArrow.visible = true;
                ghostArrow.visible = true;
                
                // Safely safeguard legend-ghost-item which was removed from HTML
                const legendGhostItem = document.getElementById('legend-ghost-item');
                if (legendGhostItem) legendGhostItem.style.display = 'flex';
            }

            // Compute target local orientation vector matching requested target Tilt angle
            if (lvl.targetTilt !== null) {
                const upVec = lvl.targetPos.clone().normalize();
                let eastVec, northVec;
                if (Math.abs(upVec.z) > 0.9999) {
                    eastVec = new THREE.Vector3(1, 0, 0);
                    northVec = new THREE.Vector3(0, upVec.z > 0 ? -1 : 1, 0);
                } else {
                    eastVec = new THREE.Vector3().crossVectors(new THREE.Vector3(0, 0, 1), upVec).normalize();
                    northVec = new THREE.Vector3().crossVectors(upVec, eastVec).normalize();
                }

                const rad = lvl.targetTilt * Math.PI / 180;
                const headingDirVec = eastVec.clone().multiplyScalar(Math.cos(rad)).add(northVec.clone().multiplyScalar(Math.sin(rad))).normalize();
                ghostArrow.setDirection(headingDirVec);
            }

            updateLvlNavButtons(); // Instantly configure state of level buttons
            updateTelemetryData();

            // Trigger onboarding tutorial only upon initiating Level 1
            if (lvlId === 1) {
                startTutorialOnboarding();
            } else {
                endTutorialOnboarding();
            }
        }

        // Display quick flash message
        function triggerTemporaryHUDNotification(text) {

        // --- RELATIVE ORIENTATION MOTORS & UNDO STACK ---
        const GLOBAL_AXIS_Z = new THREE.Vector3(0, 0, 1);
        const GLOBAL_AXIS_X_CLOCKWISE = new THREE.Vector3(1, 0, 0);

        const activeSegments = [];
        const rotationHistory = [];
        const undoButton = document.getElementById('btn-undo');

        let totalRotated = 0.0;
        const odomElement = document.getElementById('odom-value');

        function calculatePhysicalDistanceStep(angleDegrees, rotationAxis) {
            chassisDot.getWorldPosition(carWorldPos);
            carWorldPos.normalize();

            let r = 1.0;
            if (rotationAxis === GLOBAL_AXIS_Z) {
                r = Math.sqrt(1 - carWorldPos.z * carWorldPos.z);
            } else {
                r = Math.sqrt(1 - carWorldPos.x * carWorldPos.x);
            }

            return (Math.abs(angleDegrees) / 15.0) * r;
        }

        function addToOdometer(angleDegrees, rotationAxis) {
            const isDistanceMode = levelDefinitions[currentLevel].isPhysicalDistance;
            const delta = isDistanceMode ? calculatePhysicalDistanceStep(angleDegrees, rotationAxis) : Math.abs(angleDegrees);
            totalRotated += delta;
            updateOdometerDisplay(totalRotated);
        }

        // Active control state helpers (No longer blocked by tutorialActive!)
        function updateUndoButtonState() {
            undoButton.disabled = rotationHistory.length === 0;
        }

        function applyDirectStepRotation(angleDegrees, rotationAxis) {
            const rads = THREE.MathUtils.degToRad(angleDegrees);
            const stepQ = new THREE.Quaternion().setFromAxisAngle(rotationAxis, rads);
            planetGroup.quaternion.premultiply(stepQ);
        }

        function rebuildActiveSegments() {
            activeSegments.length = 0;
            for (let hist of rotationHistory) {
                const axis = hist.axis;
                const angle = hist.angleDegrees;
                if (activeSegments.length === 0) {
                    activeSegments.push({ axis: axis, angle: angle });
                } else {
                    const lastSeg = activeSegments[activeSegments.length - 1];
                    if (lastSeg.axis === axis) {
                        lastSeg.angle += angle;
                    } else {
                        if (Math.abs(angle) > 0.01) {
                            activeSegments.push({ axis: axis, angle: angle });
                        }
                    }
                }
            }
        }

        function applyStepWithHistory(angleDegrees, rotationAxis) {
            if (isLevelCompleted) return; // Inputs allowed freely during tutorial!

            const isDistanceMode = levelDefinitions[currentLevel].isPhysicalDistance;
            const odomAddition = isDistanceMode ? calculatePhysicalDistanceStep(angleDegrees, rotationAxis) : Math.abs(angleDegrees);
            const axisName = (rotationAxis === GLOBAL_AXIS_Z) ? 'Z' : 'X';
            
            const startQ = planetGroup.quaternion.clone();

            applyDirectStepRotation(angleDegrees, rotationAxis);
            planetGroup.updateMatrixWorld(true);

            const endQ = planetGroup.quaternion.clone();

            rotationHistory.push({
                startQuaternion: startQ,
                endQuaternion: endQ,
                odometerAdd: odomAddition,
                axis: axisName,
                angleDegrees: angleDegrees
            });
            updateUndoButtonState();
            rebuildActiveSegments();
            addToOdometer(angleDegrees, rotationAxis);
            rebuildTraceAndMarkers(); 
        }

        document.getElementById('btn1-left').addEventListener('click', () => {
            const val = parseFloat(document.getElementById('num1').value) || 0;
            applyStepWithHistory(-val, GLOBAL_AXIS_Z);
        });
        document.getElementById('btn1-right').addEventListener('click', () => {
            const val = parseFloat(document.getElementById('num1').value) || 0;
            applyStepWithHistory(val, GLOBAL_AXIS_Z);
        });

        document.getElementById('btn2-left').addEventListener('click', () => {
            const val = parseFloat(document.getElementById('num2').value) || 0;
            applyStepWithHistory(-val, GLOBAL_AXIS_X_CLOCKWISE);
        });
        document.getElementById('btn2-right').addEventListener('click', () => {
            const val = parseFloat(document.getElementById('num2').value) || 0;

        // --- LEVEL SELECT NAV BUTTON EVENT HANDLERS ---
        document.getElementById('btn-prev-lvl').addEventListener('click', () => {

            }
        });

        document.getElementById('btn-next-lvl').addEventListener('click', () => {

                currentLevel++;

            }
        });

        // --- UNDO ACTION EVENT ---
        undoButton.addEventListener('click', () => {
            if (rotationHistory.length === 0 || isLevelCompleted) return; // Inputs allowed freely during tutorial!

            const previousState = rotationHistory.pop();
            
            planetGroup.quaternion.copy(previousState.startQuaternion);
            planetGroup.updateMatrixWorld(true);

            totalRotated = Math.max(0.0, totalRotated - previousState.odometerAdd);
            updateOdometerDisplay(totalRotated);

            updateUndoButtonState();
            rebuildActiveSegments();
            rebuildTraceAndMarkers(); 
        });

        // --- RESET / CLEAR CONTROLLER ACTION ---
        document.getElementById('btn-reset').addEventListener('click', () => {
            resetCarAndOdometer();
            isLevelCompleted = false;
            document.getElementById('completion-modal').classList.remove('show');
            configureLevel(currentLevel); // clean rebuild
        });

        // --- RELATIVE TOUCH CONTROLLER LOGIC ---
        function setupRelativeRotaryDial(dialId, indicatorId, valueId, targetGlobalAxis) {
            const dial = document.getElementById(dialId);
            const indicator = document.getElementById(indicatorId);
            const display = document.getElementById(valueId);

            let active = false;
            let centerPoint = { x: 0, y: 0 };
            let lastAngle = 0;
            let accumulatedDialRotation = 0; 
            let startQuat = null; 

            const activeColor = dialId === 'dial1' ? "#3b82f6" : "#eab308";

            function calculateInteractionAngle(clientX, clientY) {
                const dy = clientY - centerPoint.y;
                const dx = clientX - centerPoint.x;
                return Math.atan2(dy, dx) * (180 / Math.PI);
            }

            function interactionStart(clientX, clientY) {
                if (isLevelCompleted) return; // Inputs allowed freely during tutorial!
                active = true;
                const rect = dial.getBoundingClientRect();
                centerPoint = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
                lastAngle = calculateInteractionAngle(clientX, clientY);
                accumulatedDialRotation = 0;
                startQuat = planetGroup.quaternion.clone();
                display.style.color = activeColor;
            }

            function interactionMove(clientX, clientY) {
                if (!active || isLevelCompleted) return; // Inputs allowed freely during tutorial!
                const currentAngle = calculateInteractionAngle(clientX, clientY);
                
                let delta = currentAngle - lastAngle;

                if (delta > 180) delta -= 360;
                if (delta < -180) delta += 360;

                lastAngle = currentAngle;
                accumulatedDialRotation += delta;

                const displayAngle = Math.round(accumulatedDialRotation);
                indicator.style.transform = `rotate(${displayAngle}deg)`;
                display.innerText = (displayAngle > 0 ? '+' : '') + displayAngle + '°';

                applyDirectStepRotation(delta, targetGlobalAxis);
                planetGroup.updateMatrixWorld(true);
            }

            function interactionEnd() {
                if (!active) return;
                active = false;

                const absoluteNetDelta = Math.abs(accumulatedDialRotation);
                if (absoluteNetDelta > 0.05) {
                    const isDistanceMode = levelDefinitions[currentLevel].isPhysicalDistance;
                    const odomAddition = isDistanceMode ? calculatePhysicalDistanceStep(accumulatedDialRotation, targetGlobalAxis) : absoluteNetDelta;
                    const axisName = (targetGlobalAxis === GLOBAL_AXIS_Z) ? 'Z' : 'X';

                    rotationHistory.push({
                        startQuaternion: startQuat.clone(),
                        endQuaternion: planetGroup.quaternion.clone(),
                        odometerAdd: odomAddition,
                        axis: axisName,
                        angleDegrees: accumulatedDialRotation
                    });
                    updateUndoButtonState();
                    rebuildActiveSegments();
                    addToOdometer(accumulatedDialRotation, targetGlobalAxis);
                    rebuildTraceAndMarkers(); 
                }

                indicator.style.transform = "rotate(0deg)";
                display.innerText = "0°";
                display.style.color = "#666";
            }

            dial.addEventListener('mousedown', (e) => { e.preventDefault(); interactionStart(e.clientX, e.clientY); });
            window.addEventListener('mousemove', (e) => interactionMove(e.clientX, e.clientY));
            window.addEventListener('mouseup', interactionEnd);

            dial.addEventListener('touchstart', (e) => { e.preventDefault(); interactionStart(e.touches[0].clientX, e.touches[0].clientY); });
            window.addEventListener('touchmove', (e) => { if (active) { e.preventDefault(); interactionMove(e.touches[0].clientX, e.touches[0].clientY); } });
            window.addEventListener('touchend', interactionEnd);
        }

        setupRelativeRotaryDial('dial1', 'ind1', 'val1', GLOBAL_AXIS_Z);
        setupRelativeRotaryDial('dial2', 'ind2', 'val2', GLOBAL_AXIS_X_CLOCKWISE);

        // --- TELEMETRY READOUT & PUZZLE COINCIDENCE CHECKS ---
        const telemetryLat = document.getElementById('telemetry-lat');
        const telemetryLon = document.getElementById('telemetry-lon');
        const telemetryHdg = document.getElementById('telemetry-hdg');

        const carWorldPos = new THREE.Vector3();
        const carWorldQuat = new THREE.Quaternion();
        const globalNorth = new THREE.Vector3(0, 0, 1);

        function updateTelemetryData() {
            chassisDot.getWorldPosition(carWorldPos);
            carWorldPos.normalize();

            // Latitude
            const lat = Math.asin(carWorldPos.z) * THREE.MathUtils.RAD2DEG;
            const absLat = Math.abs(lat).toFixed(1);
            const latDirection = lat >= 0 ? "N" : "S";

            // Longitude
            let lon = (Math.atan2(carWorldPos.y, carWorldPos.x) * THREE.MathUtils.RAD2DEG) + 90;
            while (lon > 180) lon -= 360;
            while (lon <= -180) lon += 360;
            const absLon = Math.abs(lon).toFixed(1);
            const lonDirection = lon >= 0 ? "E" : "W";

            carGroup.getWorldQuaternion(carWorldQuat);
            const arrowWorldDir = new THREE.Vector3(1, 0, 0).applyQuaternion(carWorldQuat).normalize();

            const localUp = carWorldPos.clone();
            const localEast = new THREE.Vector3();
            const localNorth = new THREE.Vector3();

            if (Math.abs(localUp.z) > 0.9999) {
                localEast.set(1, 0, 0);
                localNorth.set(0, localUp.z > 0 ? -1 : 1, 0);
            } else {
                localEast.crossVectors(globalNorth, localUp).normalize();
                localNorth.crossVectors(localUp, localEast).normalize();
            }

            const projEast = arrowWorldDir.dot(localEast);
            const projNorth = arrowWorldDir.dot(localNorth);

            // Compute local Tilt
            let tiltAngle = Math.atan2(projNorth, projEast) * THREE.MathUtils.RAD2DEG;
            while (tiltAngle > 180) tiltAngle -= 360;
            while (tiltAngle <= -180) tiltAngle += 360;

            telemetryLat.innerText = `${absLat}° ${latDirection}`;
            telemetryLon.innerText = `${absLon}° ${lonDirection}`;
            telemetryHdg.innerText = `${tiltAngle.toFixed(1)}°`;

            // --- CHECK FOR PARKING SPOT COINCIDENCE (Pose matching Pose B) ---
            if (!isLevelCompleted && !tutorialActive) {
                const currentLvl = levelDefinitions[currentLevel];
                if (currentLvl) {
                    const positionDistance = carWorldPos.distanceTo(currentLvl.targetPos);
                    
                    if (currentLvl.isQuiz) {
                        // For Quiz Levels, we check if they have successfully arrived at B (disregarding tilt)
                        // Precise tolerance of 0.5 degrees on unit sphere = 0.008726 rad distance
                        if (positionDistance < 0.008726 && !arrivedAtTarget) {
                            arrivedAtTarget = true;
                            triggerTemporaryHUDNotification("📍 Target reached! Now answer the quiz in the instruction panel.");
                            renderQuizInHUD();
                        }
                    } else {
                        // Standard Driving Levels
                        let isMatched = false;
                        if (currentLvl.targetTilt === null) {
                            // Precise tolerance matching 0.5 degrees on the unit sphere
                            isMatched = (positionDistance < 0.008726);
                        } else {
                            let angleDiff = Math.abs(tiltAngle - currentLvl.targetTilt);
                            if (angleDiff > 180) angleDiff = 360 - angleDiff;
                            // Precise 0.5 degrees tilt AND position tolerances
                            isMatched = (positionDistance < 0.008726 && angleDiff < 0.5);
                        }

                        if (isMatched) {
                            isLevelCompleted = true;
                            maxLevelUnlocked = Math.min(9, Math.max(maxLevelUnlocked, currentLevel + 1));
                            updateLvlNavButtons();
                            triggerVictorySequence(currentLvl);
                        }
                    }
                }
            }
        }

        // Handles the intermediate celebration and 2-second timing transition
        // Sized down vertical height to prevent forcing scrolling within limited canvas space
        function triggerVictorySequence(lvl) {
            if (lvl.isQuiz) {
                showLevelCompletedModal(lvl);
            } else {
                const banner = document.getElementById('celebration-banner');
                banner.style.display = 'block';

                setTimeout(() => {
                    banner.style.display = 'none';
                    showLevelCompletedModal(lvl);
                }, 2000);
            }
        }

        // Triggers the successful modal sequence with highscore tracking and slow fade transition
        function showLevelCompletedModal(lvl) {
            const currentScore = totalRotated;
            const previousRecord = highscores[currentLevel]; 
            let isNewRecord = false;

            if (previousRecord === null || currentScore < previousRecord) {
                highscores[currentLevel] = currentScore;
                isNewRecord = true;
            }

            const bestScore = highscores[currentLevel];
            const unit = lvl.isPhysicalDistance ? "m" : "°";
            const recordText = previousRecord !== null ? previousRecord.toFixed(1) + unit : 'No record set yet';

            // Custom description paragraphs for Level 4 distance success checks
            let dynamicExplanation = lvl.explanation;
            if (currentLevel === 5) {
                if (currentScore <= 12.05) {
                    dynamicExplanation = `Spectacular! You found the shortest possible path of exactly <strong>12.0m</strong>!<br><br>Notice how your Solar rotation didn't add any walk distance. This is because rotations inside the axis (when the vehicle lies directly on the axis of rotation) are pure and do not produce any displacement!`;
                } else {
                    dynamicExplanation = `You made it back! But your walk distance was <strong>${currentScore.toFixed(1)}m</strong>. Can you find a shorter path? Hint: Try rotating around the Solar axis first while sitting at Sunrise to see if you can bypass extra walking.`;
                }
            } else if (currentLevel === 9) {
                // Incorporate both the basic congratulations explanation and the mathematical proof clearly
                dynamicExplanation = `
                    <p><strong>Amazing navigation!</strong> You successfully identified the geometric constraints at high latitude.</p>
                    <p style="margin-top: 10px; line-height: 1.4;">${lvl.explanation}</p>
                    <p style="margin-top: 10px; font-style: italic; border-left: 2px solid #eab308; padding-left: 10px; color: #ddd; font-size: 12.5px; line-height: 1.4;">
                        <strong>Proof:</strong> ${lvl.quizExplanation}
                    </p>
                `;
            }

            // Formulate modern horizontal scoreboard stats row to save vertical space!
            const scoreboardHtml = `
                <div style="font-family: monospace; background: #252830; border: 1px solid #4ade80; padding: 10px 16px; border-radius: 8px; margin: 12px 0; font-size: 12.5px; display: flex; justify-content: space-around; gap: 10px; text-align: center; flex-wrap: wrap; box-sizing: border-box; flex-shrink: 0;">
                    <div style="flex: 1; min-width: 120px;"><span style="color: #888;">ODOMETER:</span> <strong style="color: #4ade80; font-size: 13.5px;">${currentScore.toFixed(1)}${unit}</strong></div>
                    <div style="flex: 1; min-width: 120px; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1);"><span style="color: #888;">PREV BEST:</span> <strong style="color: #eab308; font-size: 13.5px;">${recordText}</strong></div>
                    <div style="flex: 1; min-width: 120px;"><span style="color: #888;">RECORD:</span> <strong style="color: #3b82f6; font-size: 13.5px;">${bestScore.toFixed(1)}${unit}</strong></div>
                </div>
                ${(isNewRecord && previousRecord !== null) ? '<div style="color: #4ade80; font-weight: bold; text-transform: uppercase; font-size: 10.5px; text-align: center; margin-top: 4px; letter-spacing: 0.5px;">★ New Personal Best! ★</div>' : ''}
                ${(isNewRecord && previousRecord === null) ? '<div style="color: #4ade80; font-weight: bold; text-transform: uppercase; font-size: 10.5px; text-align: center; margin-top: 4px; letter-spacing: 0.5px;">★ First Record Set! ★</div>' : ''}
            `;

            document.getElementById('modal-heading').innerHTML = `🚗 PARKING SUCCESSFUL! <span style="font-size: 15px;">(${lvl.title})</span>`;
            document.getElementById('modal-content').innerHTML = dynamicExplanation + scoreboardHtml;
            
            // Ensure content viewport scrolls back to the top automatically on content switches
            document.getElementById('modal-content').scrollTop = 0;
            
            const nextBtn = document.getElementById('modal-next-btn');
            const retryBtn = document.getElementById('modal-retry-btn');

            // Restore defaults
            retryBtn.innerText = "Retry Challenge";
            retryBtn.style.display = 'inline-block';

            if (currentLevel === 1) {
                nextBtn.innerText = "Begin Challenge 2 🚀";
            } else if (currentLevel === 2) {
                nextBtn.innerText = "Begin Challenge 3 🚀";
            } else if (currentLevel === 3) {
                nextBtn.innerText = "Begin Challenge 3* 🚀";
            } else if (currentLevel === 4) {
                nextBtn.innerText = "Begin Challenge 4 🚀";
            } else if (currentLevel === 5) {
                nextBtn.innerText = "Begin Challenge 5 🚀";
            } else if (currentLevel === 6) {
                nextBtn.innerText = "Begin Challenge 5 Pro 🚀";
            } else if (currentLevel === 7) {
                nextBtn.innerText = "Begin Challenge 5* 🚀";
            } else if (currentLevel === 8) {
                nextBtn.innerText = "Begin Challenge 5** 🚀";
            } else if (currentLevel === 9) {
                nextBtn.innerText = "View Scoreboard 🏆";
            }
            
            // Trigger overlay fade-in transition
            document.getElementById('completion-modal').classList.add('show');
        }

        // Renders the highscore scoreboard overview dynamically inside the modal card
        function showScoreboardView() {
            document.getElementById('modal-heading').innerHTML = `🏆 Mission Control Record Book`;
            
            let highscoreOverviewHtml = `
                <div style="text-align: left; margin-bottom: 5px;">
                    <p style="font-size: 12.5px; color: #ddd; line-height: 1.4; margin-bottom: 8px;">
                        Congratulations! You have completed all physical transport and holonomy challenges. Official laboratory record:
                    </p>
                    <table style="width: 100%; border-collapse: collapse; font-size: 11px; font-family: monospace;">
                        <thead>
                            <tr style="border-bottom: 1px solid #444; color: #888; text-align: left;">
                                <th style="padding: 3px 0; width: 10%;">Lvl</th>
                                <th style="padding: 3px 0; width: 65%;">Challenge Name</th>
                                <th style="padding: 3px 0; width: 25%; text-align: right;">Personal Best</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            for (let lId = 1; lId <= 9; lId++) {
                const lDef = levelDefinitions[lId];
                const scoreVal = highscores[lId];
                const lUnit = lDef.isPhysicalDistance ? "m" : "°";
                const displayScore = scoreVal !== null ? `${scoreVal.toFixed(1)}${lUnit}` : `<span style="color:#666;">-</span>`;
                
                highscoreOverviewHtml += `
                    <tr style="border-bottom: 1px solid #2d2d2d; color: #ddd;">
                        <td style="padding: 4px 0; color: #888;">${lId}</td>
                        <td style="padding: 4px 0;">${lDef.title}</td>
                        <td style="padding: 4px 0; text-align: right; font-weight: bold; color: ${scoreVal !== null ? '#4ade80' : '#666'};">${displayScore}</td>
                    </tr>
                `;
            }
            
            highscoreOverviewHtml += `
                        </tbody>
                    </table>
                    
                    <p style="margin-top: 8px; color: #eab308; font-weight: bold; font-style: italic; border-top: 1px dashed #444; padding-top: 8px; font-size: 11.5px; line-height: 1.4;">
                        💡 Optimization Challenge: Can you find even shorter routes? Try replaying Level 1 or Level 4!
                    </p>
                </div>
            `;

            document.getElementById('modal-content').innerHTML = highscoreOverviewHtml;
            
            // Auto scroll container back to top so user is perfectly positioned
            document.getElementById('modal-content').scrollTop = 0;

            const nextBtn = document.getElementById('modal-next-btn');
            const retryBtn = document.getElementById('modal-retry-btn');

            retryBtn.innerText = "⬅️ Back to Explanation";
            nextBtn.innerText = "Replay Challenge 1 🔄";
        }

        // --- REAL-TIME GRAPHICAL BLINKING CONTROLLER (Slow and Smooth) ---
        // Refactored to adjust brightness multiplication instead of raw hue overrides (prevents color shifts!)
        function applyTutorialBlinking(cycle) {
            const step = tutorialSteps[currentTutorialStep];
            if (!step) return;

            resetVisualMaterials(); // Clean reset previous opacities first to avoid visual blending bugs

            switch(step.targetBlink) {
                case "planetStory":
                    // Smooth glow planet and axes without hue shifts!
                    unitPlanet.material.opacity = cycle * 0.7;
                    polarAxisPole.material.color.setHex(0x3b82f6).multiplyScalar(0.4 + 0.6 * cycle);
                    solarAxisPole.material.color.setHex(0xeab308).multiplyScalar(0.4 + 0.6 * cycle);
                    break;
                case "roverGoal":
                    // Smooth alternate breathing glow rover and ghost parking spot
                    chassisDot.material.opacity = cycle;
                    headingArrow.line.material.transparent = true;
                    headingArrow.line.material.opacity = cycle;
                    headingArrow.cone.material.transparent = true;
                    headingArrow.cone.material.opacity = cycle;
                    
                    ghostChassis.material.opacity = (1.0 - cycle) * 0.7 + 0.1;
                    ghostArrow.line.material.opacity = (1.0 - cycle) * 0.7 + 0.1;
                    ghostArrow.cone.material.opacity = (1.0 - cycle) * 0.7 + 0.1;
                    break;
                case "landmarksOnly":
                case "coordinateRings":
                    // Flash DOM landmark labels shadows slowly and smoothly
                    document.querySelectorAll('.dom-label').forEach(el => {
                        el.style.opacity = cycle * 0.95;
                        el.style.boxShadow = `0 0 15px rgba(59, 130, 246, ${cycle * 0.7})`;
                        el.style.borderColor = `rgba(255, 255, 255, ${cycle * 0.5})`;
                    });
                    break;
                case "viewControls":
                    // Calm pulse on the sphere to encourage mouse drag interactions
                    unitPlanet.material.opacity = 0.2 + cycle * 0.2;
                    break;
                case "polarAxis":
                    // Smooth blink on blue vertical polar pole
                    polarAxisPole.material.color.setHex(0x3b82f6).multiplyScalar(0.3 + 0.7 * cycle);
                    polarIndicatorRing.children.forEach(c => {
                        c.material.transparent = true;
                        c.material.opacity = cycle;
                    });
                    break;
                case "solarAxis":
                    // Smooth blink on yellow horizontal solar pole
                    solarAxisPole.material.color.setHex(0xeab308).multiplyScalar(0.3 + 0.7 * cycle);
                    solarIndicatorRing.children.forEach(c => {
                        c.material.transparent = true;
                        c.material.opacity = cycle;
                    });
                    break;
                case "levelOneInstructions":
                    // Highly focus ghost parking spot
                    ghostChassis.material.opacity = cycle * 0.9;
                    ghostArrow.line.material.opacity = cycle * 0.9;
                    ghostArrow.cone.material.opacity = cycle * 0.9;
                    break;
            }
        }

        function resetVisualMaterials() {
            unitPlanet.material.opacity = 0.28;
            polarAxisPole.material.color.setHex(0x3b82f6);
            solarAxisPole.material.color.setHex(0xeab308);

            chassisDot.material.opacity = 1.0;
            headingArrow.line.material.transparent = false;
            headingArrow.line.material.opacity = 1.0;
            headingArrow.cone.material.transparent = false;
            headingArrow.cone.material.opacity = 1.0;

            ghostChassis.material.opacity = 0.30;
            ghostArrow.line.material.opacity = 0.35;
            ghostArrow.cone.material.opacity = 0.35;

            equatorRing.material.opacity = 0.7;
            noonMidnightRing.material.opacity = 0.6;
            sunriseSunsetRing.material.opacity = 0.6;
            north45.material.opacity = 0.45;
            south45.material.opacity = 0.45;

            polarIndicatorRing.children.forEach(c => {
                c.material.transparent = false;
                c.material.opacity = 1.0;
            });
            solarIndicatorRing.children.forEach(c => {
                c.material.transparent = false;
                c.material.opacity = 1.0;
            });

            document.querySelectorAll('.dom-label').forEach(el => {
                el.style.boxShadow = '0 4px 10px rgba(0,0,0,0.6)';
                el.style.borderColor = 'rgba(255, 255, 255, 0.25)';
            });
        }

        // --- HIGH-PERFORMANCE VECTOR MATRIX PROJECTION LOOP ---
        const projectionVector = new THREE.Vector3();

        function updateScreenSpaceLabels() {
            const wHalf = container.clientWidth / 2;
            const hHalf = container.clientHeight / 2;

            for (let i = 0; i < trackedLandmarks.length; i++) {
                const item = trackedLandmarks[i];
                item.threeObject.getWorldPosition(projectionVector);
                projectionVector.project(camera);

                if(projectionVector.z > 1) {
                    item.domElement.style.opacity = 0;
                    continue;
                }

                const posX = (projectionVector.x * wHalf) + wHalf;
                const posY = -(projectionVector.y * hHalf) + hHalf;

                item.domElement.style.left = posX + 'px';
                item.domElement.style.top = (posY - 6) + 'px';
                
                // Do not override opacity when tutorial is managing landmark highlights
                if (!tutorialActive) {
                    item.domElement.style.opacity = item.targetOpacity; 
                }
            }
        }

        function frameExecution() {
            requestAnimationFrame(frameExecution);
            controls.update();
            updateScreenSpaceLabels();
            updateTelemetryData();

            if (tutorialActive) {
                // Slower breathing wave oscillation timing (0.003 frequency) for slow and smooth blinking
                const cycle = Math.sin(Date.now() * 0.003) * 0.35 + 0.65; 
                applyTutorialBlinking(cycle);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
            controls.handleResize();
        });

        // Initialize Level 1 upon window load
        window.onload = function() {
            configureLevel(1);
            frameExecution();
        }
    </script>
</body>
</html>
