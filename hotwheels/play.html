            if (car.rollOverTimer <= 0) {
                // Recover car back onto the rail slot
                car.isRolledOver = false;
                car.speed = 0;
                car.velocity.set(0,0,0);
            }

            // AI still runs alongside
            updateAiPhysics();
            return;
        }

        // 1. Throttle Input Acceleration (Only Arrow Up or W drives the car)
        const gasPressed = (keys.ArrowUp || keys.w || keys.W);
        if (gasPressed && gameState !== 'FINISHED') {
            car.speed += car.accel * 0.85;
        } else {
            car.speed *= car.friction;
        }

        // Active braking if pressing Arrow Down
        if ((keys.ArrowDown || keys.s || keys.S) && car.speed > 0) {
            car.speed -= car.accel * 1.6;
        }

        car.speed = Math.max(0, Math.min(maxAllowedSpeed, car.speed));

        // 2. Increment spline slot progress
        car.slotProgress += (car.speed * 0.0003);
        if (car.slotProgress >= 1.0) car.slotProgress -= 1.0;

        // 3. Update coordinates snapping directly onto center left lane rail
        const currSlotPos = getSlotPosition(car.slotProgress, -2.2); // Left lane offset (-2.2)
        const aheadSlotPos = getSlotPosition((car.slotProgress + 0.005) % 1.0, -2.2);
        
        car.position.copy(currSlotPos);
        car.mesh.position.copy(car.position);

        car.heading = Math.atan2(aheadSlotPos.x - currSlotPos.x, aheadSlotPos.z - currSlotPos.z);
        car.mesh.rotation.y = car.heading;

        // Snaps directly to banked terrain profile
        const tangent = trackCurve.getTangentAt(car.slotProgress).normalize();
        car.mesh.rotation.x = Math.asin(tangent.y);

        const bankingAngle = getBankingAngle(car.slotProgress, currentLevel);
        car.mesh.rotation.z = bankingAngle;

        // 4. Calculate Centrifugal Force on Curves
        const futureSteps = 0.03; // Sample slightly further ahead
        const tangentAhead = trackCurve.getTangentAt((car.slotProgress + futureSteps) % 1.0).normalize();
        const curvature = tangent.angleTo(tangentAhead) * curvatureScale;
        
        const rawPlayerForce = (car.speed * car.speed) * curvature;
        // Temporal low-pass filter to prevent instant derailment on single-frame spline ripples
        car.centrifugalForce = THREE.MathUtils.lerp(car.centrifugalForce, rawPlayerForce, 0.1);

        // Update neon G-Force limit bar (Re-scaled relative to active custom gripLimit)
        const limitRatio = Math.min(1.0, car.centrifugalForce / gripLimit);
        const fill = document.getElementById('slot-meter-fill');
        fill.style.width = `${limitRatio * 100}%`;
        if (limitRatio > 0.85) {
            fill.style.background = '#ff1100'; // Critical Red
            fill.style.color = '#ff1100';
        } else if (limitRatio > 0.6) {
            fill.style.background = '#ffff00'; // Warning Yellow
            fill.style.color = '#ffff00';
        } else {
            fill.style.background = '#39ff14'; // Safe Green
            fill.style.color = '#39ff14';
        }

        // Spin wheels
        car.wheels.forEach(w => { w.rotation.x += car.speed * 0.28; });

        // Spawn tires water splash / friction smoke
        if (Math.random() < (inWater ? 0.75 : 0.3)) {
            const leftRearWorld = new THREE.Vector3(-1.9, 0.4, -2.0).applyMatrix4(car.mesh.matrixWorld);
            const rightRearWorld = new THREE.Vector3(1.9, 0.4, -2.0).applyMatrix4(car.mesh.matrixWorld);
            spawnParticle(leftRearWorld.x, leftRearWorld.y, leftRearWorld.z, (Math.random() - 0.5)*0.2, 0.12, (Math.random() - 0.5)*0.2, tireParticleColor, tireParticleType, 20);
            spawnParticle(rightRearWorld.x, rightRearWorld.y, rightRearWorld.z, (Math.random() - 0.5)*0.2, 0.12, (Math.random() - 0.5)*0.2, tireParticleColor, tireParticleType, 20);
        }

        // Sound Engine update
        soundManager.updateEngine(car.speed, maxAllowedSpeed, true);
        soundManager.updateDrift(car.centrifugalForce > (gripLimit * 0.4), Math.abs(car.speed), inWater);

        // 6. Trigger Deslotting / Rollover if force exceeds active gripLimit
        if (car.centrifugalForce > gripLimit) {
            car.isRolledOver = true;
            car.rollOverTimer = 90; // 1.5 second penalty
            
            // Slide car off guide rail tangent direction
            car.crashVelocity.set(
                Math.sin(car.heading) * car.speed * 0.45,
                0.35 + Math.random() * 0.25,
                Math.cos(car.heading) * car.speed * 0.45
            );
            car.speed = 0;
            soundManager.playBump(1.0);
        }

        // Sync AI Opponent physics in Scalextric
        updateAiPhysics();

        // Lap progression trigger
        const midPointIndex = Math.floor(curvePointsCount * 0.5);
        const lapThresholdIndex = Math.floor(curvePointsCount * 0.9);
        const startWindowIndex = Math.floor(curvePointsCount * 0.1);

        if (closestIndex > midPointIndex - 40 && closestIndex < midPointIndex + 40) {
            checkpointPassed = true;
        }
        if (closestIndex < startWindowIndex && lastClosestIdx > lapThresholdIndex) {
            if (checkpointPassed) {
                lap++;
                checkpointPassed = false;
                if (lap <= 3) {
                    lapUi.innerText = lap;
                    soundManager.playLapChime();
                } else {
                    gameState = 'FINISHED';
                    const finalTimeStr = updateTimer();
                    finalTimeSpan.innerText = finalTimeStr;
                    finishPanel.style.display = 'block';
                    soundManager.updateEngine(0, maxAllowedSpeed, true);
                }
            }
        }
        lastClosestIdx = closestIndex;
        speedUi.innerText = Math.round(Math.abs(car.speed) * 38);
        return;
    }


    // ==========================================
    // --- MODE 2: SANDBOX DRIVING ---
    // ==========================================
    document.getElementById('slot-meter-container').style.display = 'none';

    // 1. PROGRESSIVE SENSITIVITY STEERING LOGIC
    let steerValue = 0;
    const steeringPressed = (keys.ArrowLeft || keys.a || keys.A || keys.ArrowRight || keys.d || keys.D);
    
    if (steeringPressed) {
        steerDuration = Math.min(1.0, steerDuration + 0.05);
    } else {
        steerDuration = 0.0;
    }

    const progressiveMultiplier = 0.25 + 0.75 * Math.pow(steerDuration, 2.0);

    if (keys.ArrowLeft || keys.a || keys.A) steerValue = car.steerSpeed * progressiveMultiplier;
    if (keys.ArrowRight || keys.d || keys.D) steerValue = -car.steerSpeed * progressiveMultiplier;

    if (Math.abs(car.speed) > 0.1) {
        const headingModifier = car.speed > 0 ? 1 : -1;
        const speedScale = Math.min(Math.abs(car.speed) / maxAllowedSpeed, 1.0);
        car.heading += steerValue * headingModifier * (0.45 + speedScale * 0.55);
    }

    // 2. ACCELERATION / DECELERATION
    if ((keys.ArrowUp || keys.w || keys.W) && gameState !== 'FINISHED') {
        car.speed += car.accel;
    } else if ((keys.ArrowDown || keys.s || keys.S) && gameState !== 'FINISHED') {
        car.speed -= car.accel;
    } else {
        car.speed *= car.friction;
        if (Math.abs(car.speed) < 0.02) car.speed = 0;
    }

    car.speed = Math.max(car.maxSpeedReverse, Math.min(maxAllowedSpeed, car.speed));

    // 3. HORIZONTAL DRIFT AND VELOCITY CALCS
    const headingVector = new THREE.Vector3(Math.sin(car.heading), 0, Math.cos(car.heading));
    
    const isDrifting = Math.abs(steerValue) > 0.01 && Math.abs(car.speed) > maxAllowedSpeed * 0.45;
    const appliedDriftFactor = (isDrifting && !inWater) ? 0.065 : driftFactor;

    car.velocity.lerp(headingVector.clone().multiplyScalar(car.speed), appliedDriftFactor);

    car.position.x += car.velocity.x;
    car.position.z += car.velocity.z;

    // 4. VERTICAL SUSPENSION SNAP WITH CORRECT BANKING VERTICAL SHIFTS
    const ptOnSpline = sampledCurvePoints[closestIndex];
    const trackHeight = ptOnSpline.y;

    const parameter = closestIndex / curvePointsCount;
    const tangent = trackCurve.getTangentAt(parameter).normalize();
    const right = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
    
    const bankingAngle = getBankingAngle(parameter, currentLevel);
    const bankedRight = right.clone().applyAxisAngle(tangent, bankingAngle);

    const vecToCar = new THREE.Vector3().subVectors(car.position, ptOnSpline);
    const lateralDistance = vecToCar.dot(bankedRight);

    // EXACT HIGH-ALTITUDE COORDINATE OFFSET (Ensures car is always locked to banked profile)
    const targetY = trackHeight + 0.9 + bankedRight.y * lateralDistance;

    if (car.isGrounded) {
        const trackDrop = targetY - car.position.y;
        
        // Launch into airborne state if track drops suddenly underneath us (steep cliffs / launches)
        if (trackDrop < -3.5 && Math.abs(car.speed) > 2.5) {
            car.isGrounded = false;
            // Upward vertical velocity is based on the track's launch ramp inclination
            car.verticalVelocity = Math.max(0.5, car.speed * tangent.y * 1.5);
        } else {
            // Snaps directly to targetY to prevent lag-induced floating or sinking into dunes
            car.position.y = targetY;
            car.verticalVelocity = 0;
        }
    } else {
        car.verticalVelocity -= 0.07; // Satisfying gravity coefficient
        car.position.y += car.verticalVelocity;

        // Collision landing detection on the spline surface
        if (car.position.y <= targetY) {
            car.position.y = targetY;
            car.verticalVelocity = 0;
            car.isGrounded = true;

            soundManager.playBump(0.65);

            for (let i = 0; i < 8; i++) {
                spawnParticle(
                    car.position.x + (Math.random() - 0.5) * 3,
                    car.position.y - 0.5,
                    car.position.z + (Math.random() - 0.5) * 3,
                    (Math.random() - 0.5) * 0.4,
                    0.1 + Math.random() * 0.2,
                    (Math.random() - 0.5) * 0.4,
                    tireParticleColor, tireParticleType, 20
                );
            }
        }
    }

    // Absolute ground level clamp to make sure player never sinks below the road
    if (car.position.y < targetY) car.position.y = targetY;

    // 5. BOUNDARY COLLISIONS
    if (Math.abs(lateralDistance) > wallLimit) {
        const boundarySign = Math.sign(lateralDistance);
        const penetration = Math.abs(lateralDistance) - wallLimit;

        car.position.addScaledVector(bankedRight, -boundarySign * penetration);

        const velocityProjectedOnNormal = car.velocity.dot(bankedRight);
        if (velocityProjectedOnNormal * boundarySign > 0) {
            car.velocity.addScaledVector(bankedRight, -velocityProjectedOnNormal * 1.45);
            car.speed *= 0.82; 
        }

        soundManager.playBump(1.0);

        const collisionLoc = ptOnSpline.clone()
            .addScaledVector(bankedRight, boundarySign * (wallLimit + 0.5))
            .add(new THREE.Vector3(0, 0.8, 0));

        for (let i = 0; i < 5; i++) {
            spawnParticle(
                collisionLoc.x + (Math.random() - 0.5) * 2,
                collisionLoc.y + (Math.random() - 0.5) * 1.5,
                collisionLoc.z + (Math.random() - 0.5) * 2,
                (Math.random() - 0.5) * 0.8 - tangent.x * 0.25,
                0.2 + Math.random() * 0.4,
                (Math.random() - 0.5) * 0.8 - tangent.z * 0.25,
                0xff6600, // Sparks
                'spark',
                15 + Math.floor(Math.random() * 10)
            );
        }
    }

    // Run AI Opponent navigation cycles
    updateAiPhysics();

    // Check rigid body collision reactions between Tiger Shark and Skelesaurus
    handleVehiclesCollision();

    // Apply translation to player model
    car.mesh.position.copy(car.position);

    // Pitch & Yaw calculations
    let targetPitch = 0;
    if (car.isGrounded) {
        const forward = new THREE.Vector3(Math.sin(car.heading), 0, Math.cos(car.heading)).normalize();
        const directionScale = tangent.dot(forward) > 0 ? 1 : -1;
        targetPitch = Math.asin(tangent.y) * directionScale;
    } else {
        targetPitch = car.verticalVelocity * 0.25;
    }
    car.mesh.rotation.x = THREE.MathUtils.lerp(car.mesh.rotation.x, targetPitch, 0.15);
    car.mesh.rotation.y = car.heading;
    car.mesh.rotation.z = THREE.MathUtils.lerp(car.mesh.rotation.z, bankingAngle, 0.15);

    // Apply body sway based on steering
    let turnAmount = 0;
    if (keys.ArrowLeft || keys.a || keys.A) turnAmount = 1;
    if (keys.ArrowRight || keys.d || keys.D) turnAmount = -1;
    const targetTilt = turnAmount * (car.speed / maxAllowedSpeed) * 0.12;
    car.bodyMesh.rotation.z = THREE.MathUtils.lerp(car.bodyMesh.rotation.z, targetTilt, 0.1);

    // Hover suspension vibration details
    const vibration = Math.sin(performance.now() * 0.06) * 0.025 * (car.speed / maxAllowedSpeed);
    car.bodyMesh.position.y = vibration;

    // Spin wheels
    const wheelRotScale = car.speed * 0.28;
    car.wheels.forEach(w => { w.rotation.x += wheelRotScale; });

    // Spawn Player tires drift smoke / water splash
    if ((isDrifting || inWater) && Math.random() < (inWater ? 0.75 : 0.45)) {
        const leftRearWorld = new THREE.Vector3(-1.9, 0.4, -2.0).applyMatrix4(car.mesh.matrixWorld);
        const rightRearWorld = new THREE.Vector3(1.9, 0.4, -2.0).applyMatrix4(car.mesh.matrixWorld);

        spawnParticle(
            leftRearWorld.x, leftRearWorld.y, leftRearWorld.z,
            (Math.random() - 0.5) * 0.3, (inWater ? 0.15 : 0.05) + Math.random() * 0.12, (Math.random() - 0.5) * 0.3,
            tireParticleColor, tireParticleType, 20
        );
        spawnParticle(
            rightRearWorld.x, rightRearWorld.y, rightRearWorld.z,
            (Math.random() - 0.5) * 0.3, (inWater ? 0.15 : 0.05) + Math.random() * 0.12, (Math.random() - 0.5) * 0.3,
            tireParticleColor, tireParticleType, 20
        );
    }

    soundManager.updateEngine(car.speed, maxAllowedSpeed, car.isGrounded);
    soundManager.updateDrift(isDrifting, Math.abs(car.speed), inWater);

    // LAP CYCLE TRIGGERS
    const midPointIndex = Math.floor(curvePointsCount * 0.5);
    const lapThresholdIndex = Math.floor(curvePointsCount * 0.9);
    const startWindowIndex = Math.floor(curvePointsCount * 0.1);

    if (closestIndex > midPointIndex - 40 && closestIndex < midPointIndex + 40) {
        checkpointPassed = true;
    }

    if (closestIndex < startWindowIndex && lastClosestIdx > lapThresholdIndex) {
        if (checkpointPassed) {
            lap++;
            checkpointPassed = false;
            
            if (lap <= 3) {
                lapUi.innerText = lap;
                soundManager.playLapChime();
            } else {
                gameState = 'FINISHED';
                const finalTimeStr = updateTimer();
                finalTimeSpan.innerText = finalTimeStr;
                finishPanel.style.display = 'block';
                soundManager.updateEngine(0, maxAllowedSpeed, true);
            }
        }
    }

    lastClosestIdx = closestIndex;
    speedUi.innerText = Math.round(Math.abs(car.speed) * 38);
}

// --- DYNAMIC CAMERA CONTROLLER ---
function updateCamera() {
    if (!car.mesh) return;

    const backOffset = new THREE.Vector3(
        -Math.sin(car.heading),
        0,
        -Math.cos(car.heading)
    ).normalize();

    const cameraTargetPos = car.position.clone()
        .addScaledVector(backOffset, 16.5) 
        .add(new THREE.Vector3(0, 6.8, 0)); 

    camera.position.lerp(cameraTargetPos, 0.08);

    clampCameraToTrack(camera.position, wallLimit - 5.0);

    const trackingLookPoint = car.position.clone().add(
        new THREE.Vector3(Math.sin(car.heading) * 4, 1.2, Math.cos(car.heading) * 4)
    );
    camera.lookAt(trackingLookPoint);
}

// --- RENDER GAME LOOP TICK ---
function animate() {
    requestAnimationFrame(animate);

    updatePhysics();
    updateParticles();
    updateCamera();
    updateTimer();
    drawMinimap(); 

    renderer.render(scene, camera);
}

// Ensure load triggers properly on entry point
window.onload = function() {
    init();
    animate();
};
</script>
