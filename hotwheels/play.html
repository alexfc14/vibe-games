<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hot Wheels: Desert Speedway 3D</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #df9f53;
            font-family: 'Impact', 'Segoe UI', sans-serif;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        /* Top HUD elements with absolute positioning, wrap-safety and layout shift protection */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            pointer-events: none;
            z-index: 10;
            max-width: calc(100% - 200px); /* Leave plenty of space for the minimap on the right */
        }
        .hud-card {
            background: rgba(0, 0, 0, 0.75);
            border: 2px solid #ff5500;
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.5);
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            font-size: 22px;
            font-style: italic;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px #000;
            white-space: nowrap;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }
        /* Explicit widths lock the layout in place, preventing variable numbers from causing shifts */
        .hud-card:nth-child(1) { min-width: 110px; } /* Speed Card */
        .hud-card:nth-child(2) { min-width: 80px; }  /* Lap Card */
        .hud-card:nth-child(3) { min-width: 150px; } /* Timer Card */
        .hud-card:nth-child(4) { min-width: 200px; } /* Track Selector Card */
        .hud-card:nth-child(5) { min-width: 150px; } /* Game Mode Card */
        .hud-card:nth-child(6) { min-width: 160px; } /* Grip Card */

        .hud-card span, #time-ui {
            font-variant-numeric: tabular-nums; /* Monospaced digital clock layout */
        }
        .hud-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #ffaa00;
            margin-bottom: 2px;
        }
        /* Minimap Overlay styling - Placed directly in the top right corner */
        #minimap-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 140px;
            height: 140px;
            background: rgba(10, 10, 20, 0.85);
            border: 2px solid #ff5500;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.4);
            padding: 5px;
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        #minimap {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Slot G-Force Meter HUD overlay */
        #slot-meter-container {
            display: none;
            position: absolute;
            bottom: 130px;
            left: 50%;
            transform: translateX(-50%);
            width: 280px;
            background: rgba(10, 10, 20, 0.9);
            border: 2px solid #ff5500;
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.6);
            border-radius: 10px;
            padding: 10px 15px;
            z-index: 15;
            text-align: center;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #slot-meter-track {
            width: 100%;
            height: 16px;
            background: #111;
            border: 1px solid #444;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            margin-top: 4px;
        }
        #slot-meter-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #39ff14, #ffff00, #ff0000);
            box-shadow: 0 0 8px currentColor;
            transition: width 0.05s ease-out;
        }
        /* On-screen Countdown */
        #countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            color: #ffff00;
            font-style: italic;
            text-shadow: 5px 5px 0px #ff3300, -3px -3px 0px #000;
            z-index: 20;
            pointer-events: none;
            transition: transform 0.2s ease-out;
        }
        /* Race Finished Panel */
        #finish-panel {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 20, 0.95);
            border: 4px solid #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            color: #fff;
            z-index: 30;
        }
        #finish-panel h1 {
            font-size: 48px;
            color: #00ffff;
            text-transform: uppercase;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        #finish-panel p {
            font-size: 24px;
            margin-bottom: 15px;
            font-family: 'Segoe UI', sans-serif;
        }
        .time-highlight {
            color: #ffaa00;
            font-weight: bold;
            font-size: 32px;
        }
        .restart-btn {
            background: linear-gradient(180deg, #ff5500, #ff2200);
            border: 2px solid #fff;
            border-radius: 8px;
            color: #fff;
            padding: 12px 30px;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Impact', sans-serif;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 34, 0, 0.4);
            transition: transform 0.1s;
            text-transform: uppercase;
            margin-top: 15px;
        }
        .restart-btn:active {
            transform: scale(0.95);
        }
        /* Audio Unlocking Prompt Hint */
        #audio-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-family: 'Segoe UI', sans-serif;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 15px;
            pointer-events: none;
            z-index: 5;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        /* Mobile Controls */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
            z-index: 10;
        }
        .control-group {
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        .btn {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            touch-action: manipulation;
            cursor: pointer;
            transition: background 0.1s, transform 0.1s;
        }
        .btn-orange {
            border-color: #ff6a00;
            text-shadow: 0 0 8px #ff6a00;
        }
        .btn-cyan {
            border-color: #00e5ff;
            text-shadow: 0 0 8px #00e5ff;
        }
        .btn:active {
            background: rgba(255, 85, 0, 0.6);
            transform: scale(0.9);
        }
        
        /* Responsive adjustments for mid & small devices */
        @media (max-width: 1024px) {
            #hud {
                max-width: calc(100% - 180px);
            }
        }
        @media (max-width: 768px) {
            #minimap-container {
                width: 110px;
                height: 110px;
                top: 20px;
                right: 15px;
            }
            #hud {
                top: 15px;
                left: 15px;
                gap: 8px;
                max-width: calc(100% - 140px);
            }
            .hud-card {
                padding: 6px 10px;
                font-size: 14px;
            }
            .hud-card:nth-child(1) { min-width: 65px; }
            .hud-card:nth-child(2) { min-width: 45px; }
            .hud-card:nth-child(3) { min-width: 90px; }
            .hud-card:nth-child(4) { min-width: 130px; }
            .hud-card:nth-child(5) { min-width: 110px; }
            .hud-card:nth-child(6) { min-width: 110px; }
            .hud-label {
                font-size: 8px;
            }
            #audio-hint {
                font-size: 10px;
                bottom: 120px;
            }
        }
        /* Responsiveness: Hide Mobile Controls on Desktop if hovering pointer exists */
        @media (hover: hover) and (pointer: fine) {
            #mobile-controls {
                display: none;
            }
        }
    </style>
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <!-- Top HUD info -->
    <div id="hud">
        <div class="hud-card">
            <div class="hud-label">Speed</div>
            <div><span id="speed-ui">0</span> <span style="font-size:13px">MPH</span></div>
        </div>
        <div class="hud-card">
            <div class="hud-label">Lap</div>
            <div><span id="lap-ui">1</span>/3</div>
        </div>
        <div class="hud-card">
            <div class="hud-label">Time</div>
            <div id="time-ui">00:00.00</div>
        </div>
        <!-- Live Track Swapping HUD toggle -->
        <div class="hud-card" style="pointer-events: auto; cursor: pointer; border-color: #00ffff; box-shadow: 0 0 15px rgba(0, 242, 255, 0.5);" onclick="toggleLevel()">
            <div class="hud-label" style="color: #00ffff;">Track (Click)</div>
            <div id="level-ui" style="color: #fff; text-transform: uppercase;">DESERT SPEEDWAY</div>
        </div>
        <!-- Live Game Mode (Solo/AI/Scalextric) Selector -->
        <div class="hud-card" style="pointer-events: auto; cursor: pointer; border-color: #39ff14; box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);" onclick="toggleGameMode()">
            <div class="hud-label" style="color: #39ff14;">Mode (Click)</div>
            <div id="mode-ui" style="color: #fff; text-transform: uppercase;">VS AI</div>
        </div>
        <!-- Dynamic Grip Limit Adjuster Card -->
        <div id="grip-card" class="hud-card" style="pointer-events: auto; border-color: #ffaa00; box-shadow: 0 0 15px rgba(255, 170, 0, 0.5); display: none;">
            <div class="hud-label" style="color: #ffaa00;">Grip Limit (Type/Click)</div>
            <div style="display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 18px;">
                <span style="cursor: pointer; color: #ffaa00; font-size: 24px; padding: 0 8px; background: rgba(255,255,255,0.1); border-radius: 4px;" onclick="adjustGrip(-0.5)">-</span>
                <input type="number" id="grip-ui-val" value="3.0" step="0.1" min="0.1" max="999.0" onkeydown="event.stopPropagation()" onkeyup="event.stopPropagation()" oninput="manualGripChange(this.value)" style="background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #ffaa00; border-radius: 4px; width: 70px; text-align: center; font-family: inherit; font-size: 18px; font-weight: bold; outline: none; pointer-events: auto;">
                <span style="cursor: pointer; color: #ffaa00; font-size: 24px; padding: 0 8px; background: rgba(255,255,255,0.1); border-radius: 4px;" onclick="adjustGrip(0.5)">+</span>
            </div>
        </div>
    </div>

    <!-- Live G-Force Meter (Specifically for Scalextric mode) -->
    <div id="slot-meter-container">
        <div class="hud-label" style="color: #ffaa00; font-size: 11px; font-weight: bold; letter-spacing: 1.5px;">G-FORCE / GRIP LIMIT</div>
        <div id="slot-meter-track">
            <div id="slot-meter-fill"></div>
        </div>
    </div>

    <!-- Live Track Minimap overlay -->
    <div id="minimap-container">
        <canvas id="minimap" width="130" height="130"></canvas>
    </div>

    <!-- Dynamic Audio system unlock notice -->
    <div id="audio-hint">Press any control to start Sound Engine</div>

    <!-- Countdown overlay -->
    <div id="countdown-overlay">READY</div>

    <!-- Finish overlay -->
    <div id="finish-panel">
        <h1>Race Complete!</h1>
        <p>Your Final Time: <span id="final-time" class="time-highlight">00:00.00</span></p>
        <button class="restart-btn" onclick="startAudioEngine(); resetRace()">Race Again</button>
    </div>

    <!-- Mobile Screen Overlays -->
    <div id="mobile-controls">
        <!-- Steering on Left -->
        <div class="control-group">
            <div class="btn btn-cyan" id="btn-left">←</div>
            <div class="btn btn-cyan" id="btn-right">→</div>
        </div>
        <!-- Drive Controls on Right -->
        <div class="control-group">
            <div class="btn btn-orange" id="btn-reverse">↓</div>
            <div class="btn btn-orange" id="btn-gas">↑</div>
        </div>
    </div>
</div>

<script>
// --- CORE CONSTANTS & SETTING UP THREE.JS SCENE ---
const canvas = document.getElementById('gameCanvas');
const speedUi = document.getElementById('speed-ui');
const lapUi = document.getElementById('lap-ui');
const timeUi = document.getElementById('time-ui');
const countdownOverlay = document.getElementById('countdown-overlay');
const finishPanel = document.getElementById('finish-panel');
const finalTimeSpan = document.getElementById('final-time');
const minimapCanvas = document.getElementById('minimap');
const minimapCtx = minimapCanvas.getContext('2d');
const audioHint = document.getElementById('audio-hint');
const modeUi = document.getElementById('mode-ui');

let scene, camera, renderer;
let gameState = 'COUNTDOWN'; // COUNTDOWN, RACING, FINISHED
let countdownVal = 3;
let timerStart = 0;
let totalElapsed = 0;
let lap = 1;
let lastClosestIdx = -1; // -1 represents uninitialized startup state
let checkpointPassed = false;
let steerDuration = 0; // Tracks hold time of steering for subtle tap control

// Game Mode Selection Variable
let gameMode = 'VS_AI'; // 'SOLO', 'VS_AI', or 'SCALEXTRIC'

// SHARED SLOT CAR PHYSICS DEFINITIONS
let gripLimit = 3.0; // Dynamic, user-adjustable grip threshold
const curvatureScale = 5.0; // The optimized, smoothed curvature coefficient

// Level Configurations
let currentLevel = 1;
const levelConfigs = {
    1: {
        name: "DESERT SPEEDWAY",
        points: [
            new THREE.Vector3(0, 0.1, 0),             // Start/Finish Line (Flat)
            new THREE.Vector3(200, 15, 60),           // Ascending sweep
            new THREE.Vector3(450, 45, 120),          // High altitude climb peak
            new THREE.Vector3(700, 60, -50),          // Tallest hilltop corner
            new THREE.Vector3(800, 40, -250),         // Swooping coastal descent
            new THREE.Vector3(600, 15, -450),         // Running down canyon
            new THREE.Vector3(350, 5, -550),          // Floor of the canyon
            new THREE.Vector3(100, 30, -500),         // Steep ascent uphill toward launch ramp
            new THREE.Vector3(-150, 50, -580),        // RAMP Takeoff peak (Upwards launch kick!)
            new THREE.Vector3(-350, 18, -480),        // Deep landing slope (Huge air gap!)
            new THREE.Vector3(-550, 5, -350),         // Valley straightaway
            new THREE.Vector3(-700, 25, -100),        // Winding mountain ascent
            new THREE.Vector3(-600, 45, 180),         // Elevated ridge sweep
            new THREE.Vector3(-400, 20, 280),         // Crest descent turn
            new THREE.Vector3(-200, 5, 120),          // Leveling out onto speedway plains
            new THREE.Vector3(-100, 0.1, -20)         // Back home
        ]
    },
    2: {
        name: "SPIRAL ASCENSION",
        points: [
            new THREE.Vector3(-200, 0.1, -200),        // 0: Start/Finish (Flat runway start)
            new THREE.Vector3(-200, 0.1, -150),        // 1: Straight approach before loop entry
            new THREE.Vector3(-250, 12.0, -100),       // 2: Entering left loop, climbing & banking
            new THREE.Vector3(-350, 26.0, -50),        // 3: High apex of the left corner sweep
            new THREE.Vector3(-400, 38.0, 50),         // 4: Sweeping forward/left
            new THREE.Vector3(-350, 50.0, 150),        // 5: Sweeping back right, climbing high
            new THREE.Vector3(-200, 62.0, 250),        // 6: Merging back cleanly into the main ascent ramp
            new THREE.Vector3(-200, 75.0, 400),        // 7: Continuing steady ascent
            new THREE.Vector3(-160, 80.0, 520),        // 8: Peak elevation crest
            new THREE.Vector3(0, 80.0, 580),           // 9: Clean sweeping turn
            new THREE.Vector3(180, 65.0, 500),         // 10: Transition into descent
            new THREE.Vector3(340, 50.0, 320),         // 11: Descending outer spiral
            new THREE.Vector3(340, 35.0, 100),         // 12: Smooth descent glide
            new THREE.Vector3(180, 22.0, -80),         // 13: Descent loop corner
            new THREE.Vector3(10, 12.0, -30),          // 14: Smooth lower sweep
            new THREE.Vector3(-80, 5.0, 100),          // 15: Smooth landing slide
            new THREE.Vector3(40, 1.0, 220),           // 16: Transition into lake basin
            new THREE.Vector3(180, 0.1, 150),          // 17: Ground level lake entrance
            new THREE.Vector3(220, 0.1, -120),         // 18: Ground level lake exit
            new THREE.Vector3(40, 0.1, -300),          // 19: Ground level loop return
            new THREE.Vector3(-120, 0.1, -300)         // 20: Aligning run back to start point
        ]
    }
};

let trackCurve = new THREE.CatmullRomCurve3(levelConfigs[currentLevel].points, true);
const curvePointsCount = 750; // High count for smoother coordinate mapping on a long track
let sampledCurvePoints = trackCurve.getSpacedPoints(curvePointsCount);

// Minimap Bounds tracker
let minimapBounds = { minX: Infinity, maxX: -Infinity, minZ: Infinity, maxZ: -Infinity };

// Environment holding array (so they can be cleared/removed dynamically on level swap)
let environmentObjects = [];
let finishLineArch = null;
let waterGroup = null; // Container for dynamic oasis lakes

// Keyboard state tracker
const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, s: false, a: false, d: false };

// --- CAR PHYSICS & METADATA ---
const car = {
    position: new THREE.Vector3(0, 0.9, 0),
    velocity: new THREE.Vector3(0, 0, 0),
    heading: 0, // Rotation around Y axis (Radians)
    speed: 0,
    maxSpeed: 4.8, 
    maxSpeedReverse: -1.6,
    accel: 0.10,
    decel: 0.04,
    friction: 0.98,
    steerSpeed: 0.045,
    width: 3.6,
    length: 7.2,
    mesh: null,
    bodyMesh: null, // Submesh holding car visual elements to apply roll & vibration easily
    wheels: [],
    verticalVelocity: 0, // Airborne state velocity
    isGrounded: true,
    
    // Scalextric specific properties
    slotProgress: 0,
    centrifugalForce: 0,
    isRolledOver: false,
    rollOverTimer: 0,
    crashVelocity: new THREE.Vector3()
};

// --- AI OPPONENT PHYSICS & METADATA ---
const aiCar = {
    position: new THREE.Vector3(0, 0.9, 0),
    velocity: new THREE.Vector3(0, 0, 0),
    heading: 0,
    speed: 0,
    maxSpeed: 4.1, // Slower than player (4.8) to make it challenge but fully beatable
    accel: 0.08,
    decel: 0.04,
    friction: 0.98,
    steerSpeed: 0.038,
    width: 3.6,
    length: 7.2,
    mesh: null,
    bodyMesh: null,
    wheels: [],
    verticalVelocity: 0,
    isGrounded: true,
    lastClosestIdx: -1,

    // Scalextric specific properties
    slotProgress: 0,
    centrifugalForce: 0,
    isRolledOver: false,
    rollOverTimer: 0,
    crashVelocity: new THREE.Vector3()
};

// --- PROCEDURAL GENERATION: CHANNELS & DESERT ASSETS ---
let trackGroup;
const trackWidth = 65; // Increased width for better high speed handling & drifting
const wallLimit = (trackWidth / 2) - 1.8; // Distance from track center before hitting outer wall flange (30.7 units)

// Helper function to calculate banking tilt angle at any percentage `u` along the spline
function getBankingAngle(u, level) {
    if (level !== 2) return 0;
    
    // Bank the left-hand corner (u = 0.04 to 0.22)
    if (u >= 0.04 && u <= 0.22) {
        let baseBank = -0.42; // Tilt inward towards the left corner sweep
        return baseBank * Math.sin((u - 0.04) / 0.18 * Math.PI);
    }
    
    // Bank the descending outer spiral (u = 0.45 to 0.72)
    if (u >= 0.45 && u <= 0.72) {
        let baseBank = 0.45; // Tilt inward towards the right spiral center
        return baseBank * Math.sin((u - 0.45) / 0.27 * Math.PI);
    }
    return 0;
}

// Helper function to find minimum distance from any position to the track spline
function getMinDistanceToTrack(pos) {
    let minDist = Infinity;
    for (let i = 0; i < curvePointsCount; i += 3) {
        // Calculate strictly flat 2D distance on X-Z plane to prevent elevation distortions
        const dx = pos.x - sampledCurvePoints[i].x;
        const dz = pos.z - sampledCurvePoints[i].z;
        const d = Math.sqrt(dx * dx + dz * dz);
        if (d < minDist) minDist = d;
    }
    return minDist;
}

// Helper function to determine exact 3D slot coordinate positions
function getSlotPosition(u, laneOffset) {
    const pt = trackCurve.getPointAt(u);
    const tangent = trackCurve.getTangentAt(u).normalize();
    const rightVec = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
    const bankingAngle = getBankingAngle(u, currentLevel);
    const bankedRightVec = rightVec.clone().applyAxisAngle(tangent, bankingAngle);
    
    return pt.clone().addScaledVector(bankedRightVec, laneOffset).add(new THREE.Vector3(0, 0.9, 0));
}

// --- SYNTHESIZED WEB AUDIO ENGINE CLASS (No external MP3 required) ---
class GameSoundEngine {
    constructor() {
        this.ctx = null;
        this.engineOsc = null;
        this.engineSub = null;
        this.engineGain = null;
        this.engineFilter = null;
        
        this.driftOsc = null;
        this.driftGain = null;
        this.driftFilter = null;
        
        this.initialized = false;
    }

    init() {
        if (this.initialized) return;
        try {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;
            this.ctx = new AudioContextClass();
            
            // Build the Synthesized Engine notes
            this.setupEngineSound();
            // Build the Synthesized Drifting slide noise
            this.setupDriftSound();
            
            this.initialized = true;
            if (audioHint) audioHint.style.display = 'none';
        } catch (e) {
            console.warn("Audio system failed to initialize:", e);
        }
    }

    setupEngineSound() {
        // Aggressive sawtooth growl
        this.engineOsc = this.ctx.createOscillator();
        this.engineOsc.type = 'sawtooth';
        this.engineOsc.frequency.setValueAtTime(45, this.ctx.currentTime);

        // Sub-harmonic triangle note to add beefy bass rumble
        this.engineSub = this.ctx.createOscillator();
        this.engineSub.type = 'triangle';
        this.engineSub.frequency.setValueAtTime(22.5, this.ctx.currentTime);

        // Low-pass filter to block harsh treble squeals on low idle speeds
        this.engineFilter = this.ctx.createBiquadFilter();
        this.engineFilter.type = 'lowpass';
        this.engineFilter.frequency.setValueAtTime(200, this.ctx.currentTime);

        this.engineGain = this.ctx.createGain();
        this.engineGain.gain.setValueAtTime(0.0, this.ctx.currentTime); // Silent initially

        this.engineOsc.connect(this.engineFilter);
        this.engineSub.connect(this.engineFilter);
        this.engineFilter.connect(this.engineGain);
        this.engineGain.connect(this.ctx.destination);

        this.engineOsc.start();
        this.engineSub.start();
    }

    setupDriftSound() {
        // Harsh tires slide screech sound
        this.driftOsc = this.ctx.createOscillator();
        this.driftOsc.type = 'triangle';
        this.driftOsc.frequency.setValueAtTime(750, this.ctx.currentTime);

        this.driftFilter = this.ctx.createBiquadFilter();
        this.driftFilter.type = 'bandpass';
        this.driftFilter.frequency.setValueAtTime(950, this.ctx.currentTime);
        this.driftFilter.Q.setValueAtTime(4.0, this.ctx.currentTime);

        this.driftGain = this.ctx.createGain();
        this.driftGain.gain.setValueAtTime(0.0, this.ctx.currentTime); // Silent initially

        this.driftOsc.connect(this.driftFilter);
        this.driftFilter.connect(this.driftGain);
        this.driftGain.connect(this.ctx.destination);

        this.driftOsc.start();
    }

    updateEngine(speed, maxSpeed, isGrounded) {
        if (!this.initialized || !this.ctx) return;
        if (this.ctx.state === 'suspended') return;

        const speedRatio = Math.max(0, Math.min(1.0, Math.abs(speed) / maxSpeed));
        
        // Base growl frequencies
        let baseFreq = 42 + speedRatio * 150;
        
        // Simulating erratic engine sound floating when airborne
        if (!isGrounded) {
            baseFreq = 165 + Math.sin(Date.now() * 0.08) * 30; // RPM peaks and bounces out of touch bounds!
        }

        this.engineOsc.frequency.setTargetAtTime(baseFreq, this.ctx.currentTime, 0.08);
        this.engineSub.frequency.setTargetAtTime(baseFreq * 0.5, this.ctx.currentTime, 0.08);

        // Brighten low-pass cutoff as car speeds up, giving real "exhaust open" simulation
        const filterCutoff = 160 + speedRatio * 500;
        this.engineFilter.frequency.setTargetAtTime(filterCutoff, this.ctx.currentTime, 0.08);

        // Adjust overall gain levels
        let volume = 0.04 + speedRatio * 0.14;
        if (!isGrounded) volume *= 0.65; // Soften when high in air

        this.engineGain.gain.setTargetAtTime(volume, this.ctx.currentTime, 0.06);
    }

    updateDrift(isDrifting, speed, inWater = false) {
        if (!this.initialized || !this.ctx) return;
        if (this.ctx.state === 'suspended') return;

        if (inWater && speed > 0.4) {
            // Synthesize churning, bubbly water splashes instead of tire screeches
            const waterFreq = 220 + Math.sin(Date.now() * 0.22) * 90 + speed * 25;
            this.driftOsc.frequency.setTargetAtTime(waterFreq, this.ctx.currentTime, 0.05);
            this.driftFilter.frequency.setTargetAtTime(waterFreq * 1.6, this.ctx.currentTime, 0.05);
            this.driftFilter.Q.setValueAtTime(1.5, this.ctx.currentTime); // Muffled, wider band Q
            this.driftGain.gain.setTargetAtTime(0.09, this.ctx.currentTime, 0.05);
        } else if (isDrifting && speed > 1.8) {
            // Dynamic sharp sharp screeching sound
            const squealFreq = 580 + Math.sin(Date.now() * 0.12) * 140 + speed * 45;
            this.driftOsc.frequency.setTargetAtTime(squealFreq, this.ctx.currentTime, 0.05);
            this.driftFilter.frequency.setTargetAtTime(squealFreq * 1.15, this.ctx.currentTime, 0.05);
            this.driftFilter.Q.setValueAtTime(4.0, this.ctx.currentTime); // High pitch focus Q
            this.driftGain.gain.setTargetAtTime(0.04, this.ctx.currentTime, 0.05);
        } else {
            // Squeal / splash fade away instantly
            this.driftGain.gain.setTargetAtTime(0.0, this.ctx.currentTime, 0.12);
        }
    }

    playBump(intensity = 1.0) {
        if (!this.initialized || !this.ctx) return;
        if (this.ctx.state === 'suspended') return;

        try {
            // 1. Thump Impact Sound
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();

            osc.type = 'triangle';
            osc.frequency.setValueAtTime(120, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(15, this.ctx.currentTime + 0.3);

            gain.gain.setValueAtTime(0.45 * intensity, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);

            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.35);

            // 2. High Spark Friction crackle
            const bufferSize = this.ctx.sampleRate * 0.2;
            const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = this.ctx.createBufferSource();
            noise.buffer = buffer;

            const noiseFilter = this.ctx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.setValueAtTime(1400, this.ctx.currentTime);

            const noiseGain = this.ctx.createGain();
            noiseGain.gain.setValueAtTime(0.12 * intensity, this.ctx.currentTime);
            noiseGain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.18);

            noise.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(this.ctx.destination);

            noise.start();
            noise.stop(this.ctx.currentTime + 0.2);
        } catch (e) {
            console.warn(e);
        }
    }

    playBeep(isHigh = false) {
        if (!this.initialized || !this.ctx) return;
        if (this.ctx.state === 'suspended') return;

        try {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(isHigh ? 920 : 460, this.ctx.currentTime);

            gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + (isHigh ? 0.45 : 0.2));

            osc.connect(gain);
            gain.connect(this.ctx.destination);

            osc.start();
            osc.stop(this.ctx.currentTime + (isHigh ? 0.5 : 0.25));
        } catch (e) {}
    }

    playLapChime() {
        if (!this.initialized || !this.ctx) return;
        if (this.ctx.state === 'suspended') return;

        try {
            const now = this.ctx.currentTime;
            
            const triggerTone = (freq, delay, length) => {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + delay);
                
                gain.gain.setValueAtTime(0.0, now + delay);
                gain.gain.linearRampToValueAtTime(0.15, now + delay + 0.04);
                gain.gain.exponentialRampToValueAtTime(0.01, now + delay + length);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start(now + delay);
                osc.stop(now + delay + length + 0.05);
            };

            // Uplifting arcade dual chime sweep (C5 -> E5 -> G5 -> C6)
            triggerTone(523.25, 0.0, 0.3);      // C5
            triggerTone(659.25, 0.08, 0.3);     // E5
            triggerTone(783.99, 0.16, 0.3);     // G5
            triggerTone(1046.50, 0.24, 0.5);    // C6
        } catch (e) {}
    }
}

const soundManager = new GameSoundEngine();

// Quick interface to trigger audio initialization safe-unlocks
function startAudioEngine() {
    soundManager.init();
    if (soundManager.ctx && soundManager.ctx.state === 'suspended') {
        soundManager.ctx.resume();
    }
}

// Global Grip Threshold Adjustment Interface
function adjustGrip(amount) {
    gripLimit = Math.max(0.1, parseFloat((gripLimit + amount).toFixed(1)));
    document.getElementById('grip-ui-val').value = gripLimit.toFixed(1);
}

function manualGripChange(val) {
    let parsed = parseFloat(val);
    if (!isNaN(parsed) && parsed >= 0.1) {
        gripLimit = parsed;
    }
}

<script>
// --- PARTICLE SYSTEM POOL (For Drifting Smoke & Wall Sparks & Water Splashes) ---
const particles = [];
const maxParticles = 120;
let particleGeometry;

function initParticles() {
    particleGeometry = new THREE.BoxGeometry(0.35, 0.35, 0.35);
    for (let i = 0; i < maxParticles; i++) {
        const mat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 });
        const mesh = new THREE.Mesh(particleGeometry, mat);
        scene.add(mesh);
        particles.push({
            mesh: mesh,
            velocity: new THREE.Vector3(),
            life: 0,
            maxLife: 0,
            type: 'smoke'
        });
    }
}

function spawnParticle(x, y, z, vx, vy, vz, colorHex, type, maxLife = 30) {
    const p = particles.find(pt => pt.life <= 0);
    if (p) {
        p.mesh.position.set(x, y, z);
        p.velocity.set(vx, vy, vz);
        p.mesh.material.color.setHex(colorHex);
        p.mesh.material.opacity = 1.0;
        p.life = maxLife;
        p.maxLife = maxLife;
        p.type = type;
        p.mesh.scale.set(1, 1, 1);
    }
}

function updateParticles() {
    for (let p of particles) {
        if (p.life > 0) {
            p.mesh.position.add(p.velocity);
            p.life--;
            const ratio = p.life / p.maxLife;
            p.mesh.material.opacity = ratio;
            p.mesh.scale.set(ratio, ratio, ratio);
            
            if (p.type === 'smoke') {
                p.velocity.y += 0.01;
            } else if (p.type === 'spark' || p.type === 'splash') {
                p.velocity.y -= 0.015; // Gravity pulls splash drops down
            }

            if (p.life <= 0) {
                p.mesh.material.opacity = 0;
            }
        }
    }
}

<script>
// --- PROCEDURAL STABLE RIBBON METHOD FOR DETAILED TWIST-FREE TRACK ---
function buildTrack() {
    if (trackGroup) scene.remove(trackGroup);
    trackGroup = new THREE.Group();
    scene.add(trackGroup);

    const segmentsCount = 400; // More segments to render the vertical curves beautifully
    const pts = trackCurve.getSpacedPoints(segmentsCount);

    const roadPos = [];
    const roadIndices = [];
    const leftWallPos = [];
    const leftWallIndices = [];
    const rightWallPos = [];
    const rightWallIndices = [];

    const wallHeight = 4.0;

    for (let i = 0; i <= segmentsCount; i++) {
        const idx = i % segmentsCount;
        const idxNext = (i + 1) % segmentsCount;
        
        const p = pts[idx];
        const pNext = pts[idxNext];
        
        const dir = new THREE.Vector3().subVectors(pNext, p).normalize();
        const right = new THREE.Vector3(-dir.z, 0, dir.x).normalize();

        // Incorporate banking angles into Level 2 curves
        const u = idx / segmentsCount;
        const bankingAngle = getBankingAngle(u, currentLevel);
        const bankedRight = right.clone().applyAxisAngle(dir, bankingAngle);

        // Calculate perpendicular normal pointing straight "up" from banked plane
        const bankedUp = new THREE.Vector3().crossVectors(bankedRight, dir).normalize();

        // Elevate edges along banked normal
        const leftPt = p.clone().addScaledVector(bankedRight, -trackWidth / 2);
        const rightPt = p.clone().addScaledVector(bankedRight, trackWidth / 2);

        // Road Vertices (fully mapping elevation coordinates)
        roadPos.push(leftPt.x, leftPt.y, leftPt.z);   // 2 * i
        roadPos.push(rightPt.x, rightPt.y, rightPt.z); // 2 * i + 1

        // Left Wall Vertices (drawn relative to banked coordinate frame)
        leftWallPos.push(leftPt.x, leftPt.y, leftPt.z);              // 2 * i
        leftWallPos.push(leftPt.x + bankedUp.x * wallHeight, leftPt.y + bankedUp.y * wallHeight, leftPt.z + bankedUp.z * wallHeight);  // 2 * i + 1

        // Right Wall Vertices (drawn relative to banked coordinate frame)
        rightWallPos.push(rightPt.x, rightPt.y, rightPt.z);             // 2 * i
        rightWallPos.push(rightPt.x + bankedUp.x * wallHeight, rightPt.y + bankedUp.y * wallHeight, rightPt.z + bankedUp.z * wallHeight); // 2 * i + 1

        if (i < segmentsCount) {
            const r0 = 2 * i;
            const r1 = 2 * i + 1;
            const r2 = 2 * (i + 1);
            const r3 = 2 * (i + 1) + 1;

            // Road indices
            roadIndices.push(r0, r2, r1);
            roadIndices.push(r1, r2, r3);

            // Left wall indices (facing inward)
            leftWallIndices.push(r0, r1, r2);
            leftWallIndices.push(r1, r3, r2);

            // Right wall indices (facing inward)
            rightWallIndices.push(r0, r2, r1);
            rightWallIndices.push(r1, r2, r3);
        }
    }

    // Road Mesh
    const roadGeo = new THREE.BufferGeometry();
    roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(roadPos, 3));
    roadGeo.setIndex(roadIndices);
    roadGeo.computeVertexNormals();
    const roadMat = new THREE.MeshStandardMaterial({
        color: 0xff4c00, // Classic Hot Wheels Orange
        roughness: 0.3,
        metalness: 0.1,
        side: THREE.DoubleSide
    });
    const roadMesh = new THREE.Mesh(roadGeo, roadMat);
    roadMesh.receiveShadow = true;
    trackGroup.add(roadMesh);

    // Left Wall Mesh (Hot Wheels Royal Blue)
    const leftWallGeo = new THREE.BufferGeometry();
    leftWallGeo.setAttribute('position', new THREE.Float32BufferAttribute(leftWallPos, 3));
    leftWallGeo.setIndex(leftWallIndices);
    leftWallGeo.computeVertexNormals();
    const wallMat = new THREE.MeshStandardMaterial({
        color: 0x0044ff, 
        roughness: 0.4,
        metalness: 0.2,
        side: THREE.DoubleSide
    });
    const leftWallMesh = new THREE.Mesh(leftWallGeo, wallMat);
    leftWallMesh.castShadow = true;
    trackGroup.add(leftWallMesh);

    // Right Wall Mesh (Hot Wheels Royal Blue)
    const rightWallGeo = new THREE.BufferGeometry();
    rightWallGeo.setAttribute('position', new THREE.Float32BufferAttribute(rightWallPos, 3));
    rightWallGeo.setIndex(rightWallIndices);
    rightWallGeo.computeVertexNormals();
    const rightWallMesh = new THREE.Mesh(rightWallGeo, wallMat);
    rightWallMesh.castShadow = true;
    trackGroup.add(rightWallMesh);

    // Dashed Center Line (Cyan center lane elevated along banked up normals)
    const centerLinePoints = trackCurve.getSpacedPoints(500);
    for (let i = 0; i < centerLinePoints.length; i++) {
        const pt = centerLinePoints[i];
        const u = i / centerLinePoints.length;
        
        const tangent = trackCurve.getTangentAt(u).normalize();
        const rightVec = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
        const bankingAngle = getBankingAngle(u, currentLevel);
        const bankedRightVec = rightVec.clone().applyAxisAngle(tangent, bankingAngle);
        const bankedUpNormal = new THREE.Vector3().crossVectors(bankedRightVec, tangent).normalize();

        pt.addScaledVector(bankedUpNormal, 0.15); // Float slightly above track to avoid z-fighting
    }
    const centerLineGeo = new THREE.BufferGeometry().setFromPoints(centerLinePoints);
    const centerLineMat = new THREE.LineDashedMaterial({
        color: 0x00ffff,
        dashSize: 4,
        gapSize: 2
    });
    centerLine = new THREE.Line(centerLineGeo, centerLineMat);
    centerLine.computeLineDistances();
    trackGroup.add(centerLine);

    // Procedural Scalextric Slots (Metallic steel rails drawn directly onto the road surface)
    if (gameMode === 'SCALEXTRIC') {
        const leftRailPoints = [];
        const rightRailPoints = [];
        const centerPoints = trackCurve.getSpacedPoints(500);
        for (let i = 0; i < centerPoints.length; i++) {
            const pt = centerPoints[i];
            const u = i / centerPoints.length;
            const tangent = trackCurve.getTangentAt(u).normalize();
            const rightVec = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
            const bankingAngle = getBankingAngle(u, currentLevel);
            const bankedRightVec = rightVec.clone().applyAxisAngle(tangent, bankingAngle);
            const bankedUpNormal = new THREE.Vector3().crossVectors(bankedRightVec, tangent).normalize();

            // Offset laterally to represent physical left and right slot lanes (-2.2 and +2.2)
            const pL = pt.clone().addScaledVector(bankedRightVec, -2.2).addScaledVector(bankedUpNormal, 0.12);
            const pR = pt.clone().addScaledVector(bankedRightVec, 2.2).addScaledVector(bankedUpNormal, 0.12);
            leftRailPoints.push(pL);
            rightRailPoints.push(pR);
        }

        const leftRailGeo = new THREE.BufferGeometry().setFromPoints(leftRailPoints);
        const rightRailGeo = new THREE.BufferGeometry().setFromPoints(rightRailPoints);
        const railMat = new THREE.LineBasicMaterial({ color: 0x555555, linewidth: 3 });
        
        const leftRailLine = new THREE.Line(leftRailGeo, railMat);
        const rightRailLine = new THREE.Line(rightRailGeo, railMat);
        trackGroup.add(leftRailLine);
        trackGroup.add(rightRailLine);
    }
}

// --- CHECKERED START/FINISH ARCH ---
function buildFinishLineArch() {
    if (finishLineArch) scene.remove(finishLineArch);

    const archGroup = new THREE.Group();
    const pillarMat = new THREE.MeshStandardMaterial({ color: 0xff2200, roughness: 0.3 });
    
    // Custom checkerboard texture
    const size = 128;
    const canvasTex = document.createElement('canvas');
    canvasTex.width = size;
    canvasTex.height = size;
    const ctxTex = canvasTex.getContext('2d');
    ctxTex.fillStyle = '#ffffff';
    ctxTex.fillRect(0, 0, size, size);
    ctxTex.fillStyle = '#111111';
    const cell = size / 4;
    for (let x = 0; x < 4; x++) {
        for (let y = 0; y < 4; y++) {
            if ((x + y) % 2 === 0) {
                ctxTex.fillRect(x * cell, y * cell, cell, cell);
            }
        }
    }
    const checkerTexture = new THREE.CanvasTexture(canvasTex);
    checkerTexture.wrapS = THREE.RepeatWrapping;
    checkerTexture.wrapT = THREE.RepeatWrapping;
    checkerTexture.repeat.set(8, 1);
    
    const checkerMat = new THREE.MeshStandardMaterial({ map: checkerTexture, roughness: 0.4 });

    // Arch pillars (Placed safely outside the wider track edge)
    const pillarLateralOffset = (trackWidth / 2) + 3.0; // Automatically adjusts to width (35.5 units)
    const leftPillar = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 30, 10), pillarMat);
    leftPillar.position.set(-pillarLateralOffset, 15, 0);
    archGroup.add(leftPillar);

    const rightPillar = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 30, 10), pillarMat);
    rightPillar.position.set(pillarLateralOffset, 15, 0);
    archGroup.add(rightPillar);

    // Cross beam
    const beamLength = (pillarLateralOffset * 2) + 2.0; // Scaled automatically (73 units)
    const crossBar = new THREE.Mesh(new THREE.BoxGeometry(beamLength, 4.5, 5), checkerMat);
    crossBar.position.set(0, 30, 0);
    archGroup.add(crossBar);

    // Place exactly at starting point (u=0)
    const startPos = trackCurve.getPointAt(0);
    archGroup.position.copy(startPos);
    
    // Rotate to match track direction
    const tangent = trackCurve.getTangentAt(0).normalize();
    const angle = Math.atan2(tangent.x, tangent.z);
    archGroup.rotation.y = angle;

    finishLineArch = archGroup;
    scene.add(finishLineArch);
}

// --- PROCEDURAL GENERATION OF OASIS WATER LAKES ---
function buildOasisLakes() {
    if (waterGroup) scene.remove(waterGroup);
    waterGroup = new THREE.Group();
    scene.add(waterGroup);

    // Dynamic, shimmering, semi-transparent blue water meshes for submerged track sections (Screenshot 2026-06-04 at 01.45.14.png)
    const waterMat = new THREE.MeshStandardMaterial({
        color: 0x0088ff,
        roughness: 0.05,
        metalness: 0.2,
        transparent: true,
        opacity: 0.72,
        depthWrite: false
    });

    if (currentLevel === 2) {
        // Main valley lake covering the central bottom coordinates
        const lakeGeo1 = new THREE.RingGeometry(0, 480, 32);
        const lake1 = new THREE.Mesh(lakeGeo1, waterMat);
        lake1.rotation.x = -Math.PI / 2;
        lake1.position.set(120, 0.12, -40); // Lowered visual level to avoid drowning loop
        waterGroup.add(lake1);

        // Secondary small water pocket on the finish loop corridor
        const lakeGeo2 = new THREE.RingGeometry(0, 220, 32);
        const lake2 = new THREE.Mesh(lakeGeo2, waterMat);
        lake2.rotation.x = -Math.PI / 2;
        lake2.position.set(-80, 0.12, -280); 
        waterGroup.add(lake2);
    } else {
        // Minor decorative oasis for Level 1 to keep visual thematic styling matching perfectly
        const lakeGeo1 = new THREE.RingGeometry(0, 250, 24);
        const lake1 = new THREE.Mesh(lakeGeo1, waterMat);
        lake1.rotation.x = -Math.PI / 2;
        lake1.position.set(-300, 0.12, -350); 
        waterGroup.add(lake1);
    }
}

// --- SCATTER ENVIRONMENT (CACTI & DUNES) ---
function scatterEnvironment() {
    // Clear out preexisting scene elements when changing levels
    environmentObjects.forEach(obj => scene.remove(obj));
    environmentObjects = [];

    // 1. Far Dunes / Mountains (Strictly isolated from track speedway corridor)
    const duneGeo = new THREE.SphereGeometry(100, 10, 10);
    duneGeo.scale(2.2, 0.4, 1.1);
    const duneMat = new THREE.MeshStandardMaterial({
        color: 0xce8334, 
        roughness: 1.0,
        flatShading: true
    });

    for (let i = 0; i < 75; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 300 + Math.random() * 1200; 
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const tempPos = new THREE.Vector3(x, 0, z);

        // Keep dunes completely clear of the track corridor (at least 280 units away horizontally)
        if (getMinDistanceToTrack(tempPos) > 280) {
            const dune = new THREE.Mesh(duneGeo, duneMat);
            dune.position.set(x, -5, z);
            dune.rotation.y = Math.random() * Math.PI;
            scene.add(dune);
            environmentObjects.push(dune);
        }
    }

    // 2. Custom 3D Desert Cacti
    function buildCactusMesh() {
        const cactus = new THREE.Group();
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3d662f, roughness: 0.95 });

        const spine = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.6, 16, 6), bodyMat);
        spine.position.y = 8;
        spine.castShadow = true;
        cactus.add(spine);

        const b1_horiz = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 6, 6), bodyMat);
        b1_horiz.rotation.z = Math.PI / 2;
        b1_horiz.position.set(-3, 10, 0);
        b1_horiz.castShadow = true;
        cactus.add(b1_horiz);

        const b1_vert = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 6, 6), bodyMat);
        b1_vert.position.set(-6, 13, 0);
        b1_vert.castShadow = true;
        cactus.add(b1_vert);

        const b2_horiz = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 5, 6), bodyMat);
        b2_horiz.rotation.z = -Math.PI / 2;
        b2_horiz.position.set(2.5, 7, 0);
        b2_horiz.castShadow = true;
        cactus.add(b2_horiz);

        const b2_vert = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 7, 6), bodyMat);
        b2_vert.position.set(5, 10.5, 0);
        b2_vert.castShadow = true;
        cactus.add(b2_vert);

        return cactus;
    }

    const cachedCactusGeometry = buildCactusMesh();

    // Scatter cacti alongside the track as beautiful off-road decorations
    for (let i = 0; i < 250; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = 100 + Math.random() * 1100;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        const tempPos = new THREE.Vector3(x, 0, z);

        const dist = getMinDistanceToTrack(tempPos);
        // Clean off-road clearance
        if (dist > (trackWidth / 2 + 10) && dist < 1000) {
            const cactusInstance = cachedCactusGeometry.clone();
            cactusInstance.position.set(x, 0, z);
            const scale = 0.35 + Math.random() * 0.55;
            cactusInstance.scale.set(scale, scale, scale);
            scene.add(cactusInstance);
            environmentObjects.push(cactusInstance);
        }
    }
}
</script>

    createPlayerWheel(-1.9, 0.8, 2.0);

    car.mesh.position.copy(car.position);

    // Add Skelesaurus skeletal panels
    const ssChassis = buildSkelesaurusChassis();
    aiCar.bodyMesh.add(ssChassis);

    // AI Wheels setup (Lime-green rims with knobby black tires)
    const aiRimMat = new THREE.MeshStandardMaterial({ color: 0x39ff14, metalness: 0.1, roughness: 0.4 });

    aiCar.wheels = [];

        aiCar.wheels.push(wGroup);

    createAiWheel(-1.9, 0.8, 2.0);
    createAiWheel(1.9, 0.8, 2.0);
    createAiWheel(-1.9, 0.8, -2.0);
    createAiWheel(1.9, 0.8, -2.0);

    // Place AI slightly right of start point
    const aiStartOffset = gameMode === 'SCALEXTRIC' ? 2.2 : 4.0;
    aiCar.position.copy(startPoint).add(new THREE.Vector3(aiStartOffset, 0.9, 0));
    aiCar.mesh.position.copy(aiCar.position);
    aiCar.heading = car.heading;
    aiCar.mesh.rotation.y = aiCar.heading;

    // AI only gets appended to scene based on game mode state
    if (gameMode === 'VS_AI' || gameMode === 'SCALEXTRIC') {
        scene.add(aiCar.mesh);
    }
}

<script>
// --- MINIMAP STATIC CALCULATIONS ---
function initMinimapBounds() {
    sampledCurvePoints.forEach(pt => {
        if (pt.x < minimapBounds.minX) minimapBounds.minX = pt.x;
        if (pt.x > minimapBounds.maxX) minimapBounds.maxX = pt.x;
        if (pt.z < minimapBounds.minZ) minimapBounds.minZ = pt.z;
        if (pt.z > minimapBounds.maxZ) minimapBounds.maxZ = pt.z;
    });
}

// Draw live miniature tracking canvas
function drawMinimap() {
    if (minimapBounds.minX === Infinity) return;
    
    minimapCtx.clearRect(0, 0, minimapCanvas.width, minimapCanvas.height);
    
    const w = minimapCanvas.width;
    const h = minimapCanvas.height;
    const pad = 12; // margins inside 2D box
    
    const trackW = minimapBounds.maxX - minimapBounds.minX;
    const trackH = minimapBounds.maxZ - minimapBounds.minZ;
    
    // Scale preserving aspect ratios perfectly
    const scale = Math.min((w - pad * 2) / trackW, (h - pad * 2) / trackH);
    
    const mapX = (x) => pad + (x - minimapBounds.minX) * scale;
    const mapY = (z) => pad + (z - minimapBounds.minZ) * scale;
    
    // 1. Draw glowing background track path
    minimapCtx.strokeStyle = 'rgba(255, 76, 0, 0.35)'; // Classic Orange track glow
    minimapCtx.lineWidth = 6;
    minimapCtx.lineCap = 'round';
    minimapCtx.lineJoin = 'round';
    minimapCtx.beginPath();
    sampledCurvePoints.forEach((pt, idx) => {
        if (idx === 0) minimapCtx.moveTo(mapX(pt.x), mapY(pt.z));
        else minimapCtx.lineTo(mapX(pt.x), mapY(pt.z));
    });
    minimapCtx.closePath();
    minimapCtx.stroke();
    
    // Inner cyan neon guide lines
    minimapCtx.strokeStyle = '#00f2ff';
    minimapCtx.lineWidth = 1.5;
    minimapCtx.beginPath();
    sampledCurvePoints.forEach((pt, idx) => {
        if (idx === 0) minimapCtx.moveTo(mapX(pt.x), mapY(pt.z));
        else minimapCtx.lineTo(mapX(pt.x), mapY(pt.z));
    });
    minimapCtx.closePath();
    minimapCtx.stroke();
    
    // 2. Draw Start/Finish line checkered notch
    const startPt = sampledCurvePoints[0];
    const startX = mapX(startPt.x);
    const startY = mapY(startPt.z);
    
    minimapCtx.fillStyle = '#ffffff';
    minimapCtx.beginPath();
    minimapCtx.arc(startX, startY, 4.5, 0, Math.PI * 2);
    minimapCtx.fill();
    minimapCtx.strokeStyle = '#000000';
    minimapCtx.lineWidth = 1.2;
    minimapCtx.stroke();
    
    // 3. Draw Player Glowing Beacon dot
    if (car.mesh) {
        const px = mapX(car.position.x);
        const py = mapY(car.position.z);
        
        // Pulsing circular ring
        const pulseSize = 5.5 + Math.sin(Date.now() * 0.015) * 1.8;
        minimapCtx.fillStyle = 'rgba(0, 240, 255, 0.38)';
        minimapCtx.beginPath();
        minimapCtx.arc(px, py, pulseSize + 3, 0, Math.PI * 2);
        minimapCtx.fill();
        
        // White core with neon border
        minimapCtx.fillStyle = '#ffffff';
        minimapCtx.strokeStyle = '#ff3c00'; // Hot red pointer border
        minimapCtx.lineWidth = 2.0;
        minimapCtx.beginPath();
        minimapCtx.arc(px, py, 4.0, 0, Math.PI * 2);
        minimapCtx.fill();
        minimapCtx.stroke();
    }

    // 4. Draw AI Opponent beacon if enabled
    if ((gameMode === 'VS_AI' || gameMode === 'SCALEXTRIC') && aiCar.mesh) {
        const ax = mapX(aiCar.position.x);
        const ay = mapY(aiCar.position.z);

        minimapCtx.fillStyle = 'rgba(57, 255, 20, 0.3)';
        minimapCtx.beginPath();
        minimapCtx.arc(ax, ay, 7.0, 0, Math.PI * 2);
        minimapCtx.fill();

        minimapCtx.fillStyle = '#39ff14'; // Acid neon green dot
        minimapCtx.strokeStyle = '#000';
        minimapCtx.lineWidth = 1.2;
        minimapCtx.beginPath();
        minimapCtx.arc(ax, ay, 3.5, 0, Math.PI * 2);
        minimapCtx.fill();
        minimapCtx.stroke();
    }
}

// --- HUD SETTING SWAPPERS ---
function toggleLevel() {
    startAudioEngine();
    const targetLvl = currentLevel === 1 ? 2 : 1;
    loadLevel(targetLvl);
}

function loadLevel(levelNum) {
    currentLevel = levelNum;
    
    // Reconfigure Splines
    trackCurve = new THREE.CatmullRomCurve3(levelConfigs[currentLevel].points, true);
    sampledCurvePoints = trackCurve.getSpacedPoints(curvePointsCount);
    
    // Re-calculate visual boundaries
    minimapBounds = { minX: Infinity, maxX: -Infinity, minZ: Infinity, maxZ: -Infinity };
    initMinimapBounds();
    
    // Rebuild track mesh elements, scenery, water, and vehicle placements
    buildTrack();
    buildFinishLineArch();
    buildOasisLakes();
    scatterEnvironment();
    buildCars();
    
    // Synchronize HUD updates
    document.getElementById('level-ui').innerText = levelConfigs[currentLevel].name;
    
    // Begin countdown for newly chosen arena
    resetRace();
}

function toggleGameMode() {
    startAudioEngine();
    
    // Loop through Game Modes: Solo -> Vs AI -> Scalextric -> Solo
    if (gameMode === 'SOLO') {
        gameMode = 'VS_AI';
    } else if (gameMode === 'VS_AI') {
        gameMode = 'SCALEXTRIC';
    } else {
        gameMode = 'SOLO';
    }
    
    let modeText = "SOLO";
    if (gameMode === 'VS_AI') modeText = "VS AI";
    if (gameMode === 'SCALEXTRIC') modeText = "SCALEXTRIC";
    
    document.getElementById('mode-ui').innerText = modeText;

    // Toggle the display of the Grip Limit adjuster dynamically
    document.getElementById('grip-card').style.display = (gameMode === 'SCALEXTRIC') ? 'flex' : 'none';

    // Redraw track slot lines dynamically based on mode!
    buildTrack();
    buildCars();

    if (gameMode === 'VS_AI' || gameMode === 'SCALEXTRIC') {
        scene.add(aiCar.mesh);
    } else {
        scene.remove(aiCar.mesh);
    }

    resetRace();
}
</script>

<script>
// --- HANDLERS FOR DEVICE CONTROLS ---
function setupInputs() {
    window.addEventListener('keydown', (e) => {
        startAudioEngine(); // Unlock audio context safely
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.ArrowUp = true;
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.ArrowDown = true;
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.ArrowLeft = true;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.ArrowRight = true;
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') keys.ArrowUp = false;
        if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') keys.ArrowDown = false;
        if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.ArrowLeft = false;
        if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.ArrowRight = false;
    });

    // Touch setup helper for mobile UI buttons
    function bindMobileTouch(elemId, actionKey) {
        const element = document.getElementById(elemId);
        if (!element) return;
        
        const startAction = (e) => {
            e.preventDefault();
            startAudioEngine(); // Unlock context safely
            keys[actionKey] = true;
        };
        const endAction = (e) => {
            e.preventDefault();
            keys[actionKey] = false;
        };

        element.addEventListener('touchstart', startAction, {passive: false});
        element.addEventListener('touchend', endAction, {passive: false});
        element.addEventListener('touchcancel', endAction, {passive: false});

        element.addEventListener('mousedown', startAction);
        element.addEventListener('mouseup', endAction);
        element.addEventListener('mouseleave', endAction);
    }

    bindMobileTouch('btn-gas', 'ArrowUp');
    bindMobileTouch('btn-reverse', 'ArrowDown');
    bindMobileTouch('btn-left', 'ArrowLeft');
    bindMobileTouch('btn-right', 'ArrowRight');
}

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

// --- GAME STATE TIMERS ---
function triggerCountdown() {
    countdownOverlay.style.display = 'block';
    countdownVal = 3;
    countdownOverlay.innerText = "READY";
    
    let interval = setInterval(() => {
        if (countdownVal > 0) {
            countdownOverlay.innerText = countdownVal;
            countdownOverlay.style.transform = 'translate(-50%, -50%) scale(1.4)';
            soundManager.playBeep(false); // Quick tick chime
            setTimeout(() => {
                countdownOverlay.style.transform = 'translate(-50%, -50%) scale(1.0)';
            }, 200);
            countdownVal--;
        } else if (countdownVal === 0) {
            countdownOverlay.innerText = "GO!";
            countdownOverlay.style.color = '#00ffff';
            countdownOverlay.style.transform = 'translate(-50%, -50%) scale(1.6)';
            soundManager.playBeep(true); // Aggressive start chime
            gameState = 'RACING';
            timerStart = performance.now();
            countdownVal--;
        } else {
            countdownOverlay.style.display = 'none';
            clearInterval(interval);
        }
    }, 1000);
}

function resetRace() {
    const startPoint = trackCurve.getPointAt(0);
    
    // Position players based on slot mode or standard mode
    const startOffset = gameMode === 'SCALEXTRIC' ? -2.2 : -4.0;
    car.position.copy(startPoint).add(new THREE.Vector3(startOffset, 0.9, 0));
    car.mesh.position.copy(car.position);
    car.velocity.set(0, 0, 0);
    car.speed = 0;
    car.verticalVelocity = 0;
    car.isGrounded = true;
    steerDuration = 0;
    
    // Reset slot settings
    car.slotProgress = 0;
    car.centrifugalForce = 0;
    car.isRolledOver = false;
    car.rollOverTimer = 0;
    
    const startTangent = trackCurve.getTangentAt(0).normalize();
    car.heading = Math.atan2(startTangent.x, startTangent.z);
    car.mesh.rotation.set(0, car.heading, 0);
    car.bodyMesh.rotation.set(0,0,0);

    // Reset AI position
    const aiStartOffset = gameMode === 'SCALEXTRIC' ? 2.2 : 4.0;
    aiCar.position.copy(startPoint).add(new THREE.Vector3(aiStartOffset, 0.9, 0));
    if (aiCar.mesh) {
        aiCar.mesh.position.copy(aiCar.position);
        aiCar.mesh.rotation.set(0, car.heading, 0);
        aiCar.bodyMesh.rotation.set(0,0,0);
    }
    aiCar.velocity.set(0, 0, 0);
    aiCar.speed = 0;
    aiCar.verticalVelocity = 0;
    aiCar.isGrounded = true;
    aiCar.lastClosestIdx = -1;

    // Reset AI slot settings
    aiCar.slotProgress = 0;
    aiCar.centrifugalForce = 0;
    aiCar.isRolledOver = false;
    aiCar.rollOverTimer = 0;

    lap = 1;
    lastClosestIdx = -1; // Force full scan on reset
    checkpointPassed = false;
    totalElapsed = 0;

    // Reset HUD views
    lapUi.innerText = "1";
    speedUi.innerText = "0";
    timeUi.innerText = "00:00.00";
    finishPanel.style.display = "none";

    // Setup starting camera position directly behind vehicle on startup
    camera.position.copy(car.position).addScaledVector(startTangent, -16.5).add(new THREE.Vector3(0, 6.8, 0));
    camera.lookAt(car.position);

    // Start Countdown sequence
    gameState = 'COUNTDOWN';
    triggerCountdown();
}

function updateTimer() {
    if (gameState === 'RACING') {
        totalElapsed = performance.now() - timerStart;
    }
    const mins = Math.floor(totalElapsed / 60000).toString().padStart(2, '0');
    const secs = Math.floor((totalElapsed % 60000) / 1000).toString().padStart(2, '0');
    const ms = Math.floor((totalElapsed % 1000) / 10).toString().padStart(2, '0');
    timeUi.innerText = `${mins}:${secs}.${ms}`;
    return `${mins}:${secs}.${ms}`;
}

<script>
// --- CLAMP FUNCTION TO PREVENT CAMERA WALL CLIPPING ---
function clampCameraToTrack(pos, maxLateral) {
    let minDist = Infinity;
    let closestIdx = lastClosestIdx === -1 ? 0 : lastClosestIdx;

    const searchRange = 60;
    const startSearch = closestIdx - searchRange;
    const endSearch = closestIdx + searchRange;

    for (let i = startSearch; i <= endSearch; i++) {
        const idx = (i + curvePointsCount) % curvePointsCount;
        const d = pos.distanceTo(sampledCurvePoints[idx]);
        if (d < minDist) {
            minDist = d;
            closestIdx = idx;
        }
    }

    const ptOnSpline = sampledCurvePoints[closestIdx];
    const parameter = closestIdx / curvePointsCount;
    const tangent = trackCurve.getTangentAt(parameter).normalize();
    
    const right = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
    
    // Incorporate local level banking rotation into camera boundary tracking checks
    const bankingAngle = getBankingAngle(parameter, currentLevel);
    const bankedRight = right.clone().applyAxisAngle(tangent, bankingAngle);
    
    const vecToPos = new THREE.Vector3().subVectors(pos, ptOnSpline);
    const lateralDistance = vecToPos.dot(bankedRight);

    // If camera sweeps past physical boundaries, softly slide it back inside
    if (Math.abs(lateralDistance) > maxLateral) {
        const boundarySign = Math.sign(lateralDistance);
        const penetration = Math.abs(lateralDistance) - maxLateral;
        pos.addScaledVector(bankedRight, -boundarySign * penetration);
    }
}

// --- CAR-TO-CAR COLLISION RESOLUTION (Sandbox / Vs AI Modes Only) ---
function handleVehiclesCollision() {
    if (gameMode !== 'VS_AI') return;

    // 2D flat collision check (X-Z distance)
    const dx = car.position.x - aiCar.position.x;
    const dz = car.position.z - aiCar.position.z;
    const dist2D = Math.sqrt(dx * dx + dz * dz);
    const colDistLimit = 5.2; // Maximum envelope overlap radius (length / width bounds)

    if (dist2D < colDistLimit && Math.abs(car.position.y - aiCar.position.y) < 3.0) {
        const normalX = dx / dist2D;
        const normalZ = dz / dist2D;

        // Push vehicles apart to avoid clipping overlaps
        const pushFactor = (colDistLimit - dist2D) * 0.52;
        car.position.x += normalX * pushFactor;
        car.position.z += normalZ * pushFactor;

        aiCar.position.x -= normalX * pushFactor;
        aiCar.position.z -= normalZ * pushFactor;

        // Reflect velocities along the collision vector (Impulse elastic bounce)
        const relVelX = car.velocity.x - aiCar.velocity.x;
        const relVelZ = car.velocity.z - aiCar.velocity.z;

        const normalDotVel = relVelX * normalX + relVelZ * normalZ;

        if (normalDotVel < 0) { 
            const bounceRestitution = 1.35; 
            const impulseStrength = -normalDotVel * bounceRestitution;

            car.velocity.x += normalX * impulseStrength * 0.5;
            car.velocity.z += normalZ * impulseStrength * 0.5;

            aiCar.velocity.x -= normalX * impulseStrength * 0.5;
            aiCar.velocity.z -= normalZ * impulseStrength * 0.5;

            car.speed *= 0.85;
            aiCar.speed *= 0.85;
        }

        soundManager.playBump(0.85);

        const midX = (car.position.x + aiCar.position.x) * 0.5;
        const midY = (car.position.y + aiCar.position.y) * 0.5;
        const midZ = (car.position.z + aiCar.position.z) * 0.5;

        for (let i = 0; i < 6; i++) {
            spawnParticle(
                midX + (Math.random() - 0.5) * 1.5,
                midY + 0.5,
                midZ + (Math.random() - 0.5) * 1.5,
                (Math.random() - 0.5) * 0.5,
                0.15 + Math.random() * 0.35,
                (Math.random() - 0.5) * 0.5,
                0xffff00, 
                'spark',
                12 + Math.floor(Math.random() * 8)
            );
        }
    }
}

<script>
// --- AI VEHICLE LOGIC ENGINE (SANDBOX & SCALEXTRIC COMPATIBLE) ---
function updateAiPhysics() {
    if (gameMode === 'SOLO') return;

    // CRITICAL FIX: Ensure AI strictly halts and does not start early during the countdown frame states!
    if (gameState === 'COUNTDOWN') {
        aiCar.speed = 0;
        aiCar.velocity.set(0, 0, 0);
        return;
    }

    // --- CASE A: SCALEXTRIC SLOT MODE FOR AI OPPONENT ---
    if (gameMode === 'SCALEXTRIC') {
        if (aiCar.isRolledOver) {
            // Apply crash tumbling physics
            aiCar.crashVelocity.y -= 0.025; // gravity pull
            aiCar.mesh.position.add(aiCar.crashVelocity);
            
            // Tumble rot
            aiCar.mesh.rotation.x += 0.25;
            aiCar.mesh.rotation.y += 0.15;
            aiCar.mesh.rotation.z += 0.3;

            // Spawn sparks & smoke
            if (Math.random() < 0.4) {
                spawnParticle(aiCar.mesh.position.x, aiCar.mesh.position.y, aiCar.mesh.position.z, (Math.random() - 0.5)*0.5, 0.1, (Math.random() - 0.5)*0.5, 0xffaa00, 'smoke', 15);
            }

            aiCar.rollOverTimer--;
            if (aiCar.rollOverTimer <= 0) {
                // Restore AI car back into guide slot
                aiCar.isRolledOver = false;
                aiCar.speed = 0;
                aiCar.velocity.set(0,0,0);
            }
            return;
        }

        // 1. Calculate Curvature Ahead for Speed Regulation (Smooth wide-step lookahead)
        const futureSteps = 0.03; // Sample slightly further ahead to smooth out spline noise
        const currentT = trackCurve.getTangentAt(aiCar.slotProgress).normalize();
        const aheadT = trackCurve.getTangentAt((aiCar.slotProgress + futureSteps) % 1.0).normalize();
        const curvature = currentT.angleTo(aheadT) * curvatureScale; 
        
        // 2. Drive speed heuristic targeting a safe force threshold dynamically locked to user's Grip Limit
        // AI targets about 85% of the player's absolute physical deslot limit to keep the race clean and competitive
        const safetyFactor = 0.85;
        const safeSpeed = Math.sqrt((gripLimit * safetyFactor) / (Math.max(0.01, curvature)));
        
        // Introduce human-like error fluctuations (occasional minor throttle adjustments on twists)
        const noise = Math.sin(performance.now() * 0.0035) * 0.15;
        let aiTargetSpeed = Math.min(aiCar.maxSpeed, safeSpeed) + noise;

        // Check water deceleration
        let inWater = false;
        if (currentLevel === 2) {
            const distToLake1 = aiCar.position.distanceTo(new THREE.Vector3(120, aiCar.position.y, -40));
            const distToLake2 = aiCar.position.distanceTo(new THREE.Vector3(-80, aiCar.position.y, -280));
            if ((distToLake1 < 480 || distToLake2 < 220) && aiCar.position.y < 2.5) {
                inWater = true;
            }
        }
        if (inWater) aiTargetSpeed *= 0.55;

        // Accelerate or decelerate to match target speed
        if (aiCar.speed < aiTargetSpeed) {
            aiCar.speed += aiCar.accel * 0.75;
        } else {
            aiCar.speed -= aiCar.decel;
        }
        aiCar.speed = Math.max(0, Math.min(aiCar.maxSpeed, aiCar.speed));

        // 3. Increment slot progress
        aiCar.slotProgress += (aiCar.speed * 0.0003);
        if (aiCar.slotProgress >= 1.0) aiCar.slotProgress -= 1.0;

        // 4. Update coordinates snapping onto slot line
        const currSlotPos = getSlotPosition(aiCar.slotProgress, 2.2); // Right slot rail
        const aheadSlotPos = getSlotPosition((aiCar.slotProgress + 0.005) % 1.0, 2.2);
        
        aiCar.position.copy(currSlotPos);
        aiCar.mesh.position.copy(aiCar.position);
        
        aiCar.heading = Math.atan2(aheadSlotPos.x - currSlotPos.x, aheadSlotPos.z - currSlotPos.z);
        aiCar.mesh.rotation.y = aiCar.heading;

        // Align pitch
        const tangent = trackCurve.getTangentAt(aiCar.slotProgress).normalize();
        aiCar.mesh.rotation.x = Math.asin(tangent.y);

        // Apply visual banking roll
        const bankingAngle = getBankingAngle(aiCar.slotProgress, currentLevel);
        aiCar.mesh.rotation.z = bankingAngle;

        // 5. Centrifugal slide visual offsets (yaw the body outward based on optimized G-force accumulation rate)
        const targetAiForce = (aiCar.speed * aiCar.speed) * curvature;
        // Temporal low-pass filter to smooth out sudden spline calculations
        aiCar.centrifugalForce = THREE.MathUtils.lerp(aiCar.centrifugalForce, targetAiForce, 0.1);
        
        const crossY = currentT.x * aheadT.z - currentT.z * aheadT.x;
        const slideDirection = Math.sign(crossY);
        const slideYaw = -slideDirection * Math.min(0.65, aiCar.centrifugalForce * 0.28);
        aiCar.bodyMesh.rotation.y = THREE.MathUtils.lerp(aiCar.bodyMesh.rotation.y, slideYaw, 0.1);

        // Rotate tires
        aiCar.wheels.forEach(w => { w.rotation.x += aiCar.speed * 0.28; });

        // Trigger Rollover Crash if force exceeds the shared gripLimit
        if (aiCar.centrifugalForce > gripLimit) {
            aiCar.isRolledOver = true;
            aiCar.rollOverTimer = 90; // 1.5 second recovery penalty
            
            // Direct catapult vector outward matching tangent momentum
            aiCar.crashVelocity.set(
                Math.sin(aiCar.heading) * aiCar.speed * 0.45,
                0.35 + Math.random() * 0.25,
                Math.cos(aiCar.heading) * aiCar.speed * 0.45
            );
            aiCar.speed = 0;
            soundManager.playBump(1.0);
        }
        return;
    }


    // --- CASE B: SANDBOX VS AI MODE ---
    let minDist = Infinity;
    let closestIndex = 0;

    let startSearch, endSearch;
    if (aiCar.lastClosestIdx === -1) {
        startSearch = 0;
        endSearch = curvePointsCount - 1;
    } else {
        const searchRange = 50;
        startSearch = aiCar.lastClosestIdx - searchRange;
        endSearch = aiCar.lastClosestIdx + searchRange;
    }

    for (let i = startSearch; i <= endSearch; i++) {
        const idx = (i + curvePointsCount) % curvePointsCount;
        const d = aiCar.position.distanceTo(sampledCurvePoints[idx]);
        if (d < minDist) {
            minDist = d;
            closestIndex = idx;
        }
    }
    aiCar.lastClosestIdx = closestIndex;

    const lookAheadPoints = 25; 
    const targetNodeIdx = (closestIndex + lookAheadPoints) % curvePointsCount;
    const targetPoint = sampledCurvePoints[targetNodeIdx];

    const angleToTarget = Math.atan2(targetPoint.x - aiCar.position.x, targetPoint.z - aiCar.position.z);
    let angleDifference = angleToTarget - aiCar.heading;

    while (angleDifference < -Math.PI) angleDifference += Math.PI * 2;
    while (angleDifference > Math.PI) angleDifference -= Math.PI * 2;

    const steer = Math.max(-aiCar.steerSpeed, Math.min(aiCar.steerSpeed, angleDifference));
    aiCar.heading += steer * (0.55 + (Math.abs(aiCar.speed) / aiCar.maxSpeed) * 0.45);

    const turnSeverity = Math.abs(angleDifference);
    let targetSpeed = aiCar.maxSpeed;
    if (turnSeverity > 0.15) {
        targetSpeed = aiCar.maxSpeed * (1.0 - Math.min(turnSeverity * 0.7, 0.55));
    }

    let aiInWater = false;
    if (currentLevel === 2) {
        const distToLake1 = aiCar.position.distanceTo(new THREE.Vector3(120, aiCar.position.y, -40));
        const distToLake2 = aiCar.position.distanceTo(new THREE.Vector3(-80, aiCar.position.y, -280));
        if ((distToLake1 < 480 || distToLake2 < 220) && aiCar.position.y < 2.5) {
            aiInWater = true;
        }
    }

    if (aiInWater) targetSpeed *= 0.5;

    if (aiCar.speed < targetSpeed) {
        aiCar.speed += aiCar.accel;
    } else {
        aiCar.speed -= aiCar.decel;
    }
    aiCar.speed *= aiCar.friction;

    const headingVector = new THREE.Vector3(Math.sin(aiCar.heading), 0, Math.cos(aiCar.heading));
    let driftFactor = aiInWater ? 0.04 : 0.14; 
    aiCar.velocity.lerp(headingVector.clone().multiplyScalar(aiCar.speed), driftFactor);

    aiCar.position.x += aiCar.velocity.x;
    aiCar.position.z += aiCar.velocity.z;

    const ptOnSpline = sampledCurvePoints[closestIndex];
    const trackHeight = ptOnSpline.y;

    const parameter = closestIndex / curvePointsCount;
    const tangent = trackCurve.getTangentAt(parameter).normalize();
    const right = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();

    const bankingAngle = getBankingAngle(parameter, currentLevel);
    const bankedRight = right.clone().applyAxisAngle(tangent, bankingAngle);

    const vecToAi = new THREE.Vector3().subVectors(aiCar.position, ptOnSpline);
    const lateralDistance = vecToAi.dot(bankedRight);

    const targetY = trackHeight + 0.9 + bankedRight.y * lateralDistance;

    if (aiCar.isGrounded) {
        const trackDrop = targetY - aiCar.position.y;
        if (trackDrop < -3.5 && Math.abs(aiCar.speed) > 2.5) {
            aiCar.isGrounded = false;
            aiCar.verticalVelocity = Math.max(0.5, aiCar.speed * tangent.y * 1.5);
        } else {
            aiCar.position.y = targetY;
            aiCar.verticalVelocity = 0;
        }
    } else {
        aiCar.verticalVelocity -= 0.07;
        aiCar.position.y += aiCar.verticalVelocity;
        if (aiCar.position.y <= targetY) {
            aiCar.position.y = targetY;
            aiCar.verticalVelocity = 0;
            aiCar.isGrounded = true;
        }
    }

    if (aiCar.position.y < targetY) aiCar.position.y = targetY;

    if (Math.abs(lateralDistance) > wallLimit) {
        const boundarySign = Math.sign(lateralDistance);
        const penetration = Math.abs(lateralDistance) - wallLimit;
        aiCar.position.addScaledVector(bankedRight, -boundarySign * penetration);

        const velocityProjectedOnNormal = aiCar.velocity.dot(bankedRight);
        if (velocityProjectedOnNormal * boundarySign > 0) {
            aiCar.velocity.addScaledVector(bankedRight, -velocityProjectedOnNormal * 1.45);
            aiCar.speed *= 0.8;
        }
    }

    aiCar.mesh.position.copy(aiCar.position);

    let targetPitch = 0;
    if (aiCar.isGrounded) {
        const forward = new THREE.Vector3(Math.sin(aiCar.heading), 0, Math.cos(aiCar.heading)).normalize();
        const directionScale = tangent.dot(forward) > 0 ? 1 : -1;
        targetPitch = Math.asin(tangent.y) * directionScale;
    }
    aiCar.mesh.rotation.x = THREE.MathUtils.lerp(aiCar.mesh.rotation.x, targetPitch, 0.15);
    aiCar.mesh.rotation.y = aiCar.heading;
    aiCar.mesh.rotation.z = THREE.MathUtils.lerp(aiCar.mesh.rotation.z, bankingAngle, 0.15);

    const targetTilt = steer * (aiCar.speed / aiCar.maxSpeed) * 0.12;
    aiCar.bodyMesh.rotation.z = THREE.MathUtils.lerp(aiCar.bodyMesh.rotation.z, targetTilt, 0.1);

    const wheelRotScale = aiCar.speed * 0.28;
    aiCar.wheels.forEach(w => { w.rotation.x += wheelRotScale; });

    if (aiInWater && Math.random() < 0.4 && Math.abs(aiCar.speed) > 0.5) {
        const leftRearWorld = new THREE.Vector3(-1.9, 0.4, -2.0).applyMatrix4(aiCar.mesh.matrixWorld);
        const rightRearWorld = new THREE.Vector3(1.9, 0.4, -2.0).applyMatrix4(aiCar.mesh.matrixWorld);

        spawnParticle(leftRearWorld.x, leftRearWorld.y, leftRearWorld.z, (Math.random() - 0.5)*0.2, 0.15 + Math.random()*0.1, (Math.random() - 0.5)*0.2, 0x33b8ff, 'splash', 15);
        spawnParticle(rightRearWorld.x, rightRearWorld.y, rightRearWorld.z, (Math.random() - 0.5)*0.2, 0.15 + Math.random()*0.1, (Math.random() - 0.5)*0.2, 0x33b8ff, 'splash', 15);
    }
}
